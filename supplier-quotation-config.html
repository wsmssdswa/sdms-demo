<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商报价方案管理</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/sdms-comp-config-list.css">
  <link rel="stylesheet" href="./assets/css/supplier-quotation-config.css">
</head>
<body>
<div class="app-shell">
<aside class="side-bar" data-sdms-sidebar data-sidebar-key="finance"></aside>
<div class="page-shell">
<div class="header-tabs" data-sdms-header-tabs data-tab-set="finance-editor" data-tab-key="supplier-quotation" data-include-tools="true" data-user-name="张三"></div>
<main class="content-wrap">
<section class="page-card">
<section class="filter-panel">
<div class="scene-tabs" id="statusTabs"></div>
<div class="query-row">
  <div class="filter-control"><span class="filter-inline-label">方案名称</span><input class="filter-input" id="keywordInput" type="text" maxlength="50" placeholder="请输入"></div>
  <div class="filter-control"><span class="filter-inline-label">供应商名称</span><div class="select-wrap"><select class="filter-select" id="supplierSelect"><option value="">全部</option><option value="DHL物流">DHL物流</option><option value="UPS供应链">UPS供应链</option><option value="波兰本地仓">波兰本地仓</option><option value="欧洲操作中心">欧洲操作中心</option></select><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg></div></div>
  <div class="filter-control"><span class="filter-inline-label">所属仓库</span><div class="select-wrap"><select class="filter-select" id="warehouseSelect"><option value="">全部</option><option value="波兰海外仓">波兰海外仓</option><option value="德国海外仓">德国海外仓</option><option value="深圳保税仓">深圳保税仓</option></select><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg></div></div>
  <button class="btn btn-primary" id="queryBtn" type="button">查询</button>
  <button class="btn btn-default" id="resetBtn" type="button">重置</button>
</div>
</section>
<section class="table-panel">
<div class="panel-action-row"><button class="btn-new" id="createBtn" type="button">新增</button></div>
<div class="table-wrap"><table class="list-table"><colgroup><col style="width:5%"><col style="width:16%"><col style="width:12%"><col style="width:10%"><col style="width:14%"><col style="width:7%"><col style="width:7%"><col style="width:12%"><col style="width:9%"></colgroup><thead><tr><th class="cell-center">序号</th><th>方案名称</th><th>供应商名称</th><th class="cell-center">所属仓库</th><th class="cell-center">适用时间</th><th class="cell-center">费用项数</th><th class="cell-center">状态</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div>
<div class="table-footer"><div id="totalCountText">共0条记录</div><div class="pager"><div class="pager-group" id="pageBtnGroup"></div><div class="pager-group"><select class="page-size" id="pageSizeSelect" aria-label="每页条数"><option value="10" selected>10条/页</option><option value="20">20条/页</option><option value="50">50条/页</option></select></div><div class="jump-box"><input class="jump-input" id="jumpInput" type="text" inputmode="numeric" maxlength="3" value="1"><button class="jump-btn" id="jumpBtn" type="button">跳转</button></div></div></div>
</section>
</section>
</main>
</div>
</div>
<div class="toast-stack" id="toastStack"></div>
<div class="modal-mask" id="reviewModal" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-header">
      <span class="modal-title">方案审核</span>
      <button class="modal-close" id="reviewModalClose" type="button">&times;</button>
    </div>
    <div class="modal-body">
      <div class="review-choice">
        <label class="review-option"><input type="radio" name="reviewResult" value="approve" checked><span class="review-option-text">审核通过</span></label>
        <label class="review-option"><input type="radio" name="reviewResult" value="reject"><span class="review-option-text">审核驳回</span></label>
      </div>
      <div class="review-reason-wrap" id="reviewReasonWrap" style="display:none">
        <label class="review-reason-label">驳回原因 <span class="required-star">*</span></label>
        <textarea class="review-reason-input" id="reviewReasonInput" rows="4" maxlength="200" placeholder="请输入驳回原因（必填）"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" id="reviewCancelBtn" type="button">取消</button>
      <button class="btn btn-primary" id="reviewConfirmBtn" type="button">确认</button>
    </div>
  </div>
</div>
<script src="./assets/js/sdms-header-tabs.js"></script>
<script src="./assets/js/sdms-sidebar.js"></script>
<script src="./assets/js/supplier-quotation-config.js"></script>
</body>
</html>
