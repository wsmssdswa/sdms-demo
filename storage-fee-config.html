<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仓储费管理</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/storage-fee-config.css">
</head>
<body>
<div class="app-shell">
<aside class="side-bar" data-sdms-sidebar data-sidebar-key="finance"></aside>
<div class="page-shell">
<div class="header-tabs" data-sdms-header-tabs data-tab-set="finance" data-tab-key="storage-fee" data-include-tools="true" data-user-name="张三"></div>
<main class="content-wrap">
<section class="page-card">
<section class="filter-panel">
<div class="query-row">
  <div class="filter-group">
    <label class="filter-label">计费项名称</label>
    <input class="filter-input" id="keywordInput" type="text" maxlength="50" placeholder="请输入计费项名称">
  </div>
  <div class="filter-group">
    <label class="filter-label">客户</label>
    <div class="select-wrap">
      <select class="filter-select" id="customerSelect">
        <option value="">全部</option>
        <option value="深圳市星辰电子商务有限公司">深圳市星辰电子商务有限公司</option>
        <option value="杭州跨境通供应链管理有限公司">杭州跨境通供应链管理有限公司</option>
        <option value="广州优品国际贸易有限公司">广州优品国际贸易有限公司</option>
        <option value="上海锐达物流科技有限公司">上海锐达物流科技有限公司</option>
      </select>
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg>
    </div>
  </div>
  <div class="filter-group">
    <label class="filter-label">仓库</label>
    <div class="select-wrap">
      <select class="filter-select" id="warehouseSelect">
        <option value="">全部</option>
        <option value="波兰海外仓">波兰海外仓</option>
        <option value="德国海外仓">德国海外仓</option>
        <option value="深圳保税仓">深圳保税仓</option>
      </select>
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg>
    </div>
  </div>
  <div class="filter-group">
    <label class="filter-label">状态</label>
    <div class="select-wrap">
      <select class="filter-select" id="statusSelect">
        <option value="">全部</option>
        <option value="enabled">启用</option>
        <option value="disabled">停用</option>
      </select>
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg>
    </div>
  </div>
  <button class="btn btn-primary" id="queryBtn" type="button">查询</button>
  <button class="btn btn-default" id="resetBtn" type="button">重置</button>
</div>
</section>
<section class="table-panel">
<div class="panel-action-row"><button class="btn-new" id="createBtn" type="button">新增</button></div>
<div class="table-wrap"><table class="list-table"><colgroup><col style="width:5%"><col style="width:15%"><col style="width:16%"><col style="width:11%"><col style="width:8%"><col style="width:6%"><col style="width:14%"><col style="width:8%"><col style="width:10%"><col style="width:7%"></colgroup><thead><tr><th class="cell-center">序号</th><th>计费项名称</th><th>客户</th><th>所属仓库</th><th class="cell-center">计费维度</th><th class="cell-center">币种</th><th class="cell-center">适用时间</th><th class="cell-center">状态</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div>
<div class="table-footer"><div id="totalCountText">共0条记录</div><div class="pager"><div class="pager-group" id="pageBtnGroup"></div><div class="pager-group"><select class="page-size" id="pageSizeSelect" aria-label="每页条数"><option value="10" selected>10条/页</option><option value="20">20条/页</option><option value="50">50条/页</option></select></div><div class="jump-box"><input class="jump-input" id="jumpInput" type="text" inputmode="numeric" maxlength="3" value="1"><button class="jump-btn" id="jumpBtn" type="button">跳转</button></div></div></div>
</section>
</section>
</main>
</div>
</div>
<div class="toast-stack" id="toastStack"></div>
<script src="./assets/js/sdms-header-tabs.js"></script>
<script src="./assets/js/sdms-sidebar.js"></script>
<script src="./assets/js/storage-fee-config.js"></script>
</body>
</html>
