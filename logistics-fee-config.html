<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物流费管理</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/sdms-comp-config-list.css">
  <link rel="stylesheet" href="./assets/css/logistics-fee-config.css">
</head>
<body>
<div class="app-shell">
<aside class="side-bar" data-sdms-sidebar data-sidebar-key="finance"></aside>
<div class="page-shell">
<div class="header-tabs" data-sdms-header-tabs data-tab-set="finance-editor" data-tab-key="logistics-fee" data-include-tools="true" data-user-name="张三"></div>
<main class="content-wrap">
<section class="page-card">
<section class="filter-panel">
<div class="query-row">
  <div class="filter-control"><span class="filter-inline-label">物流费名称</span><input class="filter-input" id="keywordInput" type="text" maxlength="50" placeholder="请输入"></div>
  <div class="filter-control"><span class="filter-inline-label">渠道</span><div class="select-wrap"><select class="filter-select" id="channelSelect"><option value="">全部</option><option value="西欧专线">西欧专线</option><option value="全渠道">全渠道</option><option value="东南亚专线">东南亚专线</option><option value="北美专线">北美专线</option></select><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg></div></div>
  <div class="filter-control"><span class="filter-inline-label">状态</span><div class="select-wrap"><select class="filter-select" id="statusSelect"><option value="">全部</option><option value="enabled">启用</option><option value="disabled">停用</option></select><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg></div></div>
  <button class="btn btn-primary" id="queryBtn" type="button">查询</button>
  <button class="btn btn-default" id="resetBtn" type="button">重置</button>
</div>
</section>
<section class="table-panel">
<div class="panel-action-row"><button class="btn-new" id="createBtn" type="button">新增</button><button class="btn-export" id="exportBtn" type="button">导出</button></div>
<div class="table-wrap"><table class="list-table"><colgroup><col style="width:5%"><col style="width:20%"><col style="width:12%"><col style="width:8%"><col style="width:8%"><col style="width:10%"><col style="width:8%"><col style="width:14%"><col style="width:13%"></colgroup><thead><tr><th class="cell-center">序号</th><th>物流费名称</th><th>渠道</th><th class="cell-center">计重单位</th><th class="cell-center">币种</th><th>燃油规则</th><th class="cell-center">状态</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div>
<div class="table-footer"><div id="totalCountText">共0条记录</div><div class="pager"><div class="pager-group" id="pageBtnGroup"></div><div class="pager-group"><select class="page-size" id="pageSizeSelect" aria-label="每页条数"><option value="10" selected>10条/页</option><option value="20">20条/页</option><option value="50">50条/页</option></select></div><div class="jump-box"><input class="jump-input" id="jumpInput" type="text" inputmode="numeric" maxlength="3" value="1"><button class="jump-btn" id="jumpBtn" type="button">跳转</button></div></div></div>
</section>
</section>
</main>
</div>
</div>
<div class="toast-stack" id="toastStack"></div>
<script src="./assets/js/sdms-header-tabs.js"></script>
<script src="./assets/js/sdms-sidebar.js"></script>
<script src="./assets/js/logistics-fee-config.js"></script>
</body>
</html>
