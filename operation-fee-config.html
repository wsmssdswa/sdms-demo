<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>操作费管理</title>
<style>
:root{--page-bg:#eef3f8;--panel-bg:#fff;--line:#dbe4ef;--line-deep:#cfd9e6;--brand:#4d77ea;--brand-deep:#2f5fdf;--brand-light:#eaf1ff;--sidebar:#203746;--text-main:#23334d;--text-sub:#627388;--header-bg:#f5f6f8;--tab-bg:#f3f5f7;--shadow:0 2px 6px rgba(31,55,88,.06);--danger:#ff5a5f}
*{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:#a5b2c2 transparent}*::-webkit-scrollbar{width:6px;height:6px}*::-webkit-scrollbar-track{background:transparent}*::-webkit-scrollbar-thumb{background:#a5b2c2;border-radius:999px}
body{margin:0;min-width:1360px;font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:var(--page-bg);color:var(--text-main)}button,input,select{font:inherit}a{text-decoration:none;color:inherit}
.app-shell{min-height:100vh;display:flex}.side-bar{width:82px;background:linear-gradient(180deg,#203746 0%,#203746 72%,#1c3240 100%);color:#fff;display:flex;flex-direction:column;align-items:center;border-right:1px solid rgba(255,255,255,.06);box-shadow:inset -1px 0 0 rgba(255,255,255,.03)}
.logo-box{width:100%;height:72px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;letter-spacing:.3px;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-item{width:100%;padding:16px 0 14px;display:flex;flex-direction:column;align-items:center;gap:8px;color:rgba(255,255,255,.86);cursor:pointer;transition:background .2s ease,color .2s ease;position:relative;user-select:none}.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}.nav-item.active{background:rgba(90,116,239,.18);color:#fff}.nav-item.active::before{content:"";position:absolute;left:0;top:18px;bottom:18px;width:3px;border-radius:0 2px 2px 0;background:#84a2ff}.nav-item svg{width:20px;height:20px;opacity:.95}.nav-item span{font-size:12px;line-height:1;font-weight:600}.side-version{margin-top:auto;margin-bottom:10px;font-size:12px;font-weight:700;opacity:.92}
.page-shell{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--page-bg)}.header-meta{height:38px;display:flex;align-items:center;gap:6px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--header-bg);color:#526173;font-size:12px}.header-meta svg{width:12px;height:12px;color:#7d8ea3}.header-tabs{height:40px;display:flex;align-items:flex-end;gap:1px;padding:0 12px;background:#f4f6f8;border-bottom:1px solid var(--line)}
.tab-chip{height:31px;min-width:94px;padding:0 14px;border:1px solid transparent;border-bottom:0;display:inline-flex;align-items:center;gap:8px;font-size:12px;color:#4b5d70;background:var(--tab-bg);border-radius:2px 2px 0 0}.tab-chip.primary{background:var(--brand-light);color:var(--brand);border-color:#cfe0ff}.tab-chip svg{width:13px;height:13px}.close-mark{margin-left:6px;font-size:12px;color:#7ea1f2}
.content-wrap{flex:1;padding:10px 10px 14px}.page-card{min-height:calc(100vh - 103px);border:1px solid var(--line);background:#fff;box-shadow:var(--shadow);padding:10px}.filter-panel,.table-panel{border:1px solid var(--line);background:var(--panel-bg)}.filter-panel{padding:14px 14px 10px}.table-panel{margin-top:12px;display:flex;flex-direction:column;min-height:calc(100vh - 250px)}
.scene-tabs{display:flex;align-items:center;gap:26px;margin-bottom:14px;padding:0 2px}.scene-tab{position:relative;border:0;padding:0 0 8px;background:transparent;color:#2c3f57;font-size:14px;line-height:1;cursor:pointer}.scene-tab.active{color:var(--brand);font-weight:600}.scene-tab.active::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;border-radius:999px;background:var(--brand)}
.query-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.search-box{position:relative;width:232px;height:34px}.search-input{width:100%;height:100%;padding:0 38px 0 12px;border:1px solid var(--line-deep);border-radius:2px;color:var(--text-main);background:#fff;transition:border-color .2s ease,box-shadow .2s ease}.search-input::placeholder{color:#b0bcc9}.search-input:focus{outline:none;border-color:#97b5ff;box-shadow:0 0 0 3px rgba(77,119,234,.12)}.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#9aa8b8;pointer-events:none}
.btn{height:34px;min-width:58px;padding:0 18px;border-radius:3px;border:1px solid transparent;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s ease;user-select:none}.btn:active{transform:translateY(1px)}.btn-primary{color:#fff;background:var(--brand);border-color:var(--brand)}.btn-primary:hover{background:var(--brand-deep);border-color:var(--brand-deep)}.btn-default{color:#20354d;background:#fff;border-color:#b9c6d8}.btn-default:hover{color:var(--brand);border-color:#92b0ff}
.panel-action-row{padding:14px 14px 12px;border-bottom:1px solid #eef2f7}.btn-new{min-width:62px;height:30px;padding:0 18px;font-size:13px;border-radius:3px;background:var(--brand);color:#fff;border:1px solid var(--brand);cursor:pointer;transition:all .2s ease}.btn-new:hover{background:var(--brand-deep);border-color:var(--brand-deep)}.table-wrap{flex:1;overflow:auto}
.list-table{width:100%;border-collapse:collapse;table-layout:fixed}.list-table thead tr{background:#f7f9fc}.list-table th,.list-table td{padding:12px 10px;border-bottom:1px solid #edf2f7;font-size:12px;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.list-table th{color:#7788a3;font-weight:600}.list-table td{color:#23334d}.list-table tbody tr:hover{background:#f9fbff}.cell-center{text-align:center!important}.name-link,.quote-link,.action-link{color:var(--brand);transition:color .2s ease}.name-link:hover,.quote-link:hover,.action-link:hover{color:var(--brand-deep)}.action-link+.action-link{margin-left:14px}.action-link.delete{color:var(--danger)}.empty-row td{padding:52px 0;color:#9aa8b8;text-align:center!important}
.switch{position:relative;display:inline-block;width:34px;height:18px;vertical-align:middle}.switch input{opacity:0;width:0;height:0}.slider{position:absolute;inset:0;border-radius:999px;background:#c8d3e2;transition:all .2s ease;cursor:pointer}.slider::before{content:"";position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(15,39,74,.24);transition:transform .2s ease}.switch input:checked+.slider{background:var(--brand)}.switch input:checked+.slider::before{transform:translateX(16px)}
.table-footer{display:flex;align-items:center;justify-content:flex-end;gap:16px;padding:16px 14px 18px;color:#425670;font-size:12px}.pager{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.pager-group{display:flex;align-items:center;gap:6px}.page-btn,.jump-btn,.page-size{height:30px;border:1px solid #c8d3e2;background:#fff;color:#30445d;border-radius:4px;cursor:pointer}.page-btn{min-width:30px;padding:0 10px}.page-btn:hover,.jump-btn:hover,.page-size:hover{border-color:#90adff;color:var(--brand)}.page-btn.active{background:var(--brand);border-color:var(--brand);color:#fff}.page-btn.disabled{opacity:.45;cursor:not-allowed}.page-ellipsis{width:24px;text-align:center;color:#6f8096}.page-size{padding:0 8px;min-width:80px;appearance:none;background-image:linear-gradient(45deg,transparent 50%,#5f7290 50%),linear-gradient(135deg,#5f7290 50%,transparent 50%);background-position:calc(100% - 14px) 12px,calc(100% - 9px) 12px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}.jump-box{display:flex;align-items:center;gap:6px}.jump-input{width:44px;height:30px;padding:0 8px;border:1px solid #c8d3e2;border-radius:4px;color:#30445d;text-align:center}.jump-input:focus{outline:none;border-color:#90adff;box-shadow:0 0 0 3px rgba(77,119,234,.12)}.jump-btn{min-width:44px;padding:0 12px}
.toast-stack{position:fixed;top:18px;right:18px;z-index:1000;display:flex;flex-direction:column;gap:10px;pointer-events:none}.toast{min-width:240px;max-width:320px;padding:12px 14px;border-radius:8px;background:rgba(32,51,77,.95);color:#fff;box-shadow:0 12px 28px rgba(17,30,50,.22);transform:translateX(20px);opacity:0;transition:all .25s ease}.toast.show{opacity:1;transform:translateX(0)}.toast.success{background:rgba(53,95,223,.96)}.toast.warning{background:rgba(233,135,31,.96)}.toast.error{background:rgba(220,72,72,.96)}.toast-title{font-size:13px;font-weight:700;line-height:1;margin-bottom:6px}.toast-desc{font-size:12px;line-height:1.5;opacity:.92}
</style>
</head>

<div class="nav-item"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2.6a9.4 9.4 0 1 0 0 18.8 9.4 9.4 0 0 0 0-18.8Zm1 14.1h-2v-1.9H9.2v-2H11V11H9.2V9H11V7.3h2V9h1.8v2H13v1.8h1.8v2H13v1.9Z"></path></svg><span>财务</span></div>

<div class="query-row"><div class="search-box"><input class="search-input" id="keywordInput" type="text" maxlength="50" placeholder="请输入操作费名称"><svg class="search-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10.5 4a6.5 6.5 0 1 1 0 13 6.5 6.5 0 0 1 0-13Zm0 1.8a4.7 4.7 0 1 0 0 9.4 4.7 4.7 0 0 0 0-9.4Zm8.7 11.9 1.8 1.8-1.3 1.3-1.8-1.8 1.3-1.3Z"></path></svg></div><button class="btn btn-primary" id="queryBtn" type="button">查询</button><button class="btn btn-default" id="resetBtn" type="button">重置</button></div>
</section>

<div class="table-wrap"><table class="list-table"><colgroup><col style="width:5.5%"><col style="width:13.5%"><col style="width:10%"><col style="width:7.5%"><col style="width:8.5%"><col style="width:10%"><col style="width:7.5%"><col style="width:12%"><col style="width:8.5%"><col style="width:7.5%"><col style="width:11.5%"><col style="width:8%"></colgroup><thead><tr><th class="cell-center">序号</th><th>计费项名称</th><th>业务类型</th><th>币种</th><th>单位</th><th>计费节点</th><th>关联报价</th><th>备注</th><th class="cell-center">启用状态</th><th>创建人</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div>
<div class="table-footer"><div id="totalCountText">共0条记录</div><div class="pager"><div class="pager-group" id="pageBtnGroup"></div><div class="pager-group"><select class="page-size" id="pageSizeSelect" aria-label="每页条数"><option value="10" selected>10条/页</option><option value="20">20条/页</option><option value="50">50条/页</option></select></div><div class="jump-box"><input class="jump-input" id="jumpInput" type="text" inputmode="numeric" maxlength="3" value="1"><button class="jump-btn" id="jumpBtn" type="button">跳转</button></div></div></div>

<script>
(()=>{
const sceneTabs=document.getElementById('sceneTabs');const keywordInput=document.getElementById('keywordInput');const queryBtn=document.getElementById('queryBtn');const resetBtn=document.getElementById('resetBtn');const createBtn=document.getElementById('createBtn');const tableBody=document.getElementById('tableBody');const totalCountText=document.getElementById('totalCountText');const pageBtnGroup=document.getElementById('pageBtnGroup');const pageSizeSelect=document.getElementById('pageSizeSelect');const jumpInput=document.getElementById('jumpInput');const jumpBtn=document.getElementById('jumpBtn');const toastStack=document.getElementById('toastStack');
const operationLogs=[];window.operationFeeLogs=operationLogs;const state={activeScene:'入库',keyword:'',currentPage:1,pageSize:10};const pad=(n)=>String(n).padStart(2,'0');const formatDateTime=(date)=>`${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
function buildSeedData(){const base=[{name:'卸货费',scene:'入库',businessType:'大货入库',currency:'￥-RMB',unit:'kg-CBM',billingNode:'卸货完成',quoteCount:2,remark:'-',enabled:true,creator:'张三'},{name:'散收卸货费',scene:'入库',businessType:'大货入库',currency:'￥-RMB',unit:'kg-CBM',billingNode:'卸货完成',quoteCount:0,remark:'-',enabled:true,creator:'张三'},{name:'箱货入库上架费',scene:'入库',businessType:'大货入库',currency:'￥-RMB',unit:'kg-CBM',billingNode:'上架完成',quoteCount:5,remark:'-',enabled:true,creator:'张三'},{name:'理货（整柜）',scene:'入库',businessType:'大货入库',currency:'￥-RMB',unit:'kg-CBM',billingNode:'理货完成',quoteCount:1,remark:'-',enabled:true,creator:'张三'},{name:'箱货出库操作费',scene:'入库',businessType:'大货出库',currency:'$-USD',unit:'lb-CBF',billingNode:'上架完成',quoteCount:4,remark:'-',enabled:true,creator:'张三'},{name:'波兰COD退件入仓费',scene:'入库',businessType:'退件至派入库',currency:'€-EUR',unit:'kg-CBM',billingNode:'收货完成',quoteCount:1,remark:'-',enabled:true,creator:'张三'},{name:'托盘拆托费',scene:'入库',businessType:'大货入库',currency:'￥-RMB',unit:'托-CBM',billingNode:'收货完成',quoteCount:3,remark:'-',enabled:true,creator:'李四'},{name:'入仓复核费',scene:'入库',businessType:'大货入库',currency:'￥-RMB',unit:'kg-CBM',billingNode:'收货完成',quoteCount:6,remark:'-',enabled:true,creator:'李四'},{name:'加急卸货费',scene:'入库',businessType:'大货入库',currency:'$-USD',unit:'kg-CBM',billingNode:'卸货完成',quoteCount:1,remark:'加急订单专用',enabled:false,creator:'王五'},{name:'卡板整理费',scene:'入库',businessType:'大货入库',currency:'€-EUR',unit:'托-CBM',billingNode:'理货完成',quoteCount:2,remark:'-',enabled:true,creator:'王五'},{name:'装车复核费',scene:'出库',businessType:'大货出库',currency:'￥-RMB',unit:'票-CBM',billingNode:'装车完成',quoteCount:2,remark:'-',enabled:true,creator:'张三'},{name:'尾程集货费',scene:'出库',businessType:'大货出库',currency:'$-USD',unit:'kg-CBF',billingNode:'提货完成',quoteCount:3,remark:'-',enabled:true,creator:'张三'},{name:'打托服务费',scene:'增值服务',businessType:'增值服务',currency:'€-EUR',unit:'托-CBM',billingNode:'服务完成',quoteCount:4,remark:'含材料',enabled:true,creator:'李四'},{name:'贴标服务费',scene:'增值服务',businessType:'增值服务',currency:'￥-RMB',unit:'件-CBM',billingNode:'服务完成',quoteCount:7,remark:'-',enabled:true,creator:'李四'},{name:'退件复核费',scene:'售后',businessType:'售后处理',currency:'€-EUR',unit:'件-CBM',billingNode:'复核完成',quoteCount:1,remark:'-',enabled:false,creator:'王五'},{name:'拒收销毁费',scene:'售后',businessType:'售后处理',currency:'$-USD',unit:'票-CBF',billingNode:'销毁完成',quoteCount:2,remark:'-',enabled:true,creator:'王五'}];const templates=[{name:'整柜卸货附加费',scene:'入库',businessType:'大货入库',currency:'￥-RMB',unit:'柜-CBM',billingNode:'卸货完成',quoteCount:2,remark:'-',enabled:true,creator:'张三'},{name:'散货理货费',scene:'入库',businessType:'大货入库',currency:'￥-RMB',unit:'kg-CBM',billingNode:'理货完成',quoteCount:2,remark:'-',enabled:true,creator:'张三'},{name:'预约收货费',scene:'入库',businessType:'大货入库',currency:'€-EUR',unit:'票-CBM',billingNode:'收货完成',quoteCount:1,remark:'-',enabled:true,creator:'李四'},{name:'异常收货处理费',scene:'入库',businessType:'大货入库',currency:'$-USD',unit:'票-CBF',billingNode:'收货完成',quoteCount:3,remark:'-',enabled:false,creator:'王五'},{name:'波次拣货费',scene:'出库',businessType:'大货出库',currency:'￥-RMB',unit:'件-CBM',billingNode:'拣货完成',quoteCount:4,remark:'-',enabled:true,creator:'张三'},{name:'退仓上架费',scene:'售后',businessType:'售后处理',currency:'€-EUR',unit:'件-CBM',billingNode:'上架完成',quoteCount:1,remark:'-',enabled:true,creator:'李四'},{name:'换标服务费',scene:'增值服务',businessType:'增值服务',currency:'$-USD',unit:'件-CBF',billingNode:'服务完成',quoteCount:2,remark:'-',enabled:true,creator:'王五'}];const rows=[];const startTime=new Date('2023-06-08T15:00:00');base.forEach((item,index)=>{const date=new Date(startTime.getTime()-index*8*60*1000);rows.push({id:index+1,createTime:formatDateTime(date),...item});});while(rows.length<32){const template=templates[rows.length%templates.length];const index=rows.length;const date=new Date(startTime.getTime()-index*8*60*1000);rows.push({id:index+1,name:`${template.name}${index-15}`,scene:template.scene,businessType:template.businessType,currency:template.currency,unit:template.unit,billingNode:template.billingNode,quoteCount:template.quoteCount+(index%3),remark:template.remark,enabled:index%4!==0?template.enabled:!template.enabled,creator:template.creator,createTime:formatDateTime(date)});}return rows}
let rows=buildSeedData();const escapeHtml=(value)=>String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
function showToast(type,title,desc){const toast=document.createElement('div');toast.className=`toast ${type}`;toast.innerHTML=`<div class="toast-title">${escapeHtml(title)}</div><div class="toast-desc">${escapeHtml(desc)}</div>`;toastStack.appendChild(toast);requestAnimationFrame(()=>toast.classList.add('show'));setTimeout(()=>{toast.classList.remove('show');setTimeout(()=>toast.remove(),240);},2200)}
function addOperationLog(content){operationLogs.unshift(content);window.operationFeeLogs=operationLogs;console.log(`[操作日志] ${content}`)}
function getFilteredRows(){const keyword=state.keyword.trim();const sceneRows=state.activeScene==='入库'?rows:rows.filter((item)=>item.scene===state.activeScene);return sceneRows.filter((item)=>!keyword||item.name.includes(keyword)).sort((a,b)=>b.createTime.localeCompare(a.createTime))}
function getPageRows(list){const start=(state.currentPage-1)*state.pageSize;return list.slice(start,start+state.pageSize)}
function buildPageList(totalPages,currentPage){if(totalPages<=7){return Array.from({length:totalPages},(_,index)=>index+1)}if(currentPage<=4){return [1,2,3,4,5,'...',totalPages]}if(currentPage>=totalPages-3){return [1,'...',totalPages-4,totalPages-3,totalPages-2,totalPages-1,totalPages]}return [1,'...',currentPage-1,currentPage,currentPage+1,'...',totalPages]}
function renderTabs(){sceneTabs.querySelectorAll('.scene-tab').forEach((button)=>{button.classList.toggle('active',button.dataset.scene===state.activeScene)})}
function renderTable(){const filteredRows=getFilteredRows();const total=filteredRows.length;const totalPages=Math.max(1,Math.ceil(total/state.pageSize));if(state.currentPage>totalPages){state.currentPage=totalPages}const currentRows=getPageRows(filteredRows);if(!currentRows.length){tableBody.innerHTML='<tr class="empty-row"><td colspan="12">--</td></tr>'}else{tableBody.innerHTML=currentRows.map((item,index)=>`<tr><td class="cell-center">${(state.currentPage-1)*state.pageSize+index+1}</td><td><a class="name-link" href="operation-fee-create.html?mode=edit&id=${item.id}" data-action="edit" data-id="${item.id}">${escapeHtml(item.name)}</a></td><td>${escapeHtml(item.businessType||'--')}</td><td>${escapeHtml(item.currency||'--')}</td><td>${escapeHtml(item.unit||'--')}</td><td>${escapeHtml(item.billingNode||'--')}</td><td><a class="quote-link" href="javascript:void(0)">${item.quoteCount??'--'}</a></td><td>${escapeHtml(item.remark||'--')}</td><td class="cell-center"><label class="switch"><input type="checkbox" data-action="toggle" data-id="${item.id}" ${item.enabled?'checked':''}><span class="slider"></span></label></td><td>${escapeHtml(item.creator||'--')}</td><td>${escapeHtml(item.createTime||'--')}</td><td><a class="action-link" href="operation-fee-create.html?mode=edit&id=${item.id}" data-action="edit" data-id="${item.id}">编辑</a><a class="action-link delete" href="javascript:void(0)" data-action="delete" data-id="${item.id}">删除</a></td></tr>`).join('')}totalCountText.textContent=`共${total}条记录`;jumpInput.value=String(state.currentPage);renderPagination(totalPages)}
function renderPagination(totalPages){const prevDisabled=state.currentPage===1;const nextDisabled=state.currentPage===totalPages;const pages=buildPageList(totalPages,state.currentPage);const pageButtons=[];pageButtons.push(`<button class="page-btn ${prevDisabled?'disabled':''}" type="button" data-page="prev">&lt;</button>`);pages.forEach((page)=>{if(page==='...'){pageButtons.push('<span class="page-ellipsis">...</span>');return}pageButtons.push(`<button class="page-btn ${page===state.currentPage?'active':''}" type="button" data-page="${page}">${page}</button>`)});pageButtons.push(`<button class="page-btn ${nextDisabled?'disabled':''}" type="button" data-page="next">&gt;</button>`);pageBtnGroup.innerHTML=pageButtons.join('')}
function queryList(){state.keyword=keywordInput.value.trim();state.currentPage=1;renderTabs();renderTable()}
function resetList(){state.activeScene='入库';state.keyword='';state.currentPage=1;state.pageSize=10;keywordInput.value='';pageSizeSelect.value='10';renderTabs();renderTable();showToast('success','已重置','查询条件已恢复默认值，列表已重新加载。')}
function toggleStatus(id){const item=rows.find((row)=>row.id===id);if(!item)return;const nextStatus=!item.enabled;const confirmText=nextStatus?'是否确认启用该操作费？':'是否确认停用该操作费？';if(!window.confirm(confirmText)){renderTable();return}const beforeText=item.enabled?'启用':'停用';item.enabled=nextStatus;const afterText=item.enabled?'启用':'停用';addOperationLog(`修改【操作费】：计费项名称【${item.name}】、启用状态【${beforeText}】->【${afterText}】`);renderTable();showToast('success','状态已更新',`${item.name}已${afterText}。`)}
function deleteRow(id){const item=rows.find((row)=>row.id===id);if(!item)return;if(!window.confirm('删除后数据不可恢复,是否确认删除？')){return}rows=rows.filter((row)=>row.id!==id);addOperationLog(`删除【${item.name}】`);renderTable();showToast('warning','已删除',`${item.name}已从列表移除。`)}
sceneTabs.addEventListener('click',(event)=>{const button=event.target.closest('.scene-tab');if(!button||button.dataset.scene===state.activeScene)return;state.activeScene=button.dataset.scene;state.currentPage=1;renderTabs();renderTable()});
queryBtn.addEventListener('click',queryList);resetBtn.addEventListener('click',resetList);keywordInput.addEventListener('keydown',(event)=>{if(event.key==='Enter'){event.preventDefault();queryList()}});createBtn.addEventListener('click',()=>{window.location.href='operation-fee-create.html'});
tableBody.addEventListener('click',(event)=>{const actionTarget=event.target.closest('[data-action]');if(!actionTarget)return;const id=Number(actionTarget.dataset.id);const action=actionTarget.dataset.action;if(action==='delete'){event.preventDefault();deleteRow(id)}});
tableBody.addEventListener('change',(event)=>{const checkbox=event.target.closest('input[data-action="toggle"]');if(!checkbox)return;toggleStatus(Number(checkbox.dataset.id))});
pageBtnGroup.addEventListener('click',(event)=>{const button=event.target.closest('.page-btn');if(!button||button.classList.contains('disabled'))return;const filteredRows=getFilteredRows();const totalPages=Math.max(1,Math.ceil(filteredRows.length/state.pageSize));const pageValue=button.dataset.page;if(pageValue==='prev'){state.currentPage=Math.max(1,state.currentPage-1)}else if(pageValue==='next'){state.currentPage=Math.min(totalPages,state.currentPage+1)}else{state.currentPage=Number(pageValue)}renderTable()});
pageSizeSelect.addEventListener('change',()=>{state.pageSize=Number(pageSizeSelect.value);state.currentPage=1;renderTable()});
jumpBtn.addEventListener('click',()=>{const filteredRows=getFilteredRows();const totalPages=Math.max(1,Math.ceil(filteredRows.length/state.pageSize));const targetPage=Number(jumpInput.value.trim());if(!targetPage||targetPage<1||targetPage>totalPages){showToast('error','页码无效',`请输入1-${totalPages}之间的页码。`);jumpInput.value=String(state.currentPage);return}state.currentPage=targetPage;renderTable()});
jumpInput.addEventListener('input',()=>{jumpInput.value=jumpInput.value.replace(/\D/g,'')});
renderTabs();renderTable();
})();
</script>
</body>
</html>
