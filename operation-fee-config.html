<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>操作费管理</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/operation-fee-config.css">
  <link rel="stylesheet" href="./assets/css/prd-viewer.css">
</head>
<body>
<div class="app-shell">
<aside class="side-bar" data-sdms-sidebar data-sidebar-key="finance"></aside>
<div class="page-shell">
<div class="header-tabs" data-sdms-header-tabs data-tab-set="finance" data-tab-key="operation-fee" data-include-tools="true" data-include-prd-entry="true" data-prd-entry-text="查看PRD" data-user-name="张三"></div>
<main class="content-wrap">
<section class="page-card">
<section class="filter-panel">
<div class="scene-tabs" id="sceneTabs"><button class="scene-tab active" type="button" data-scene="入库">入库</button><button class="scene-tab" type="button" data-scene="出库">出库</button><button class="scene-tab" type="button" data-scene="增值服务">增值服务</button><button class="scene-tab" type="button" data-scene="售后">售后</button></div>
<div class="query-row"><div class="search-box"><input class="search-input" id="keywordInput" type="text" maxlength="50" placeholder="请输入操作费名称"><svg class="search-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10.5 4a6.5 6.5 0 1 1 0 13 6.5 6.5 0 0 1 0-13Zm0 1.8a4.7 4.7 0 1 0 0 9.4 4.7 4.7 0 0 0 0-9.4Zm8.7 11.9 1.8 1.8-1.3 1.3-1.8-1.8 1.3-1.3Z"></path></svg></div><button class="btn btn-primary" id="queryBtn" type="button">查询</button><button class="btn btn-default" id="resetBtn" type="button">重置</button></div>
</section>
<section class="table-panel">
<div class="panel-action-row"><button class="btn-new" id="createBtn" type="button">新增</button></div>
<div class="table-wrap"><table class="list-table"><colgroup><col style="width:5.5%"><col style="width:13.5%"><col style="width:10%"><col style="width:7.5%"><col style="width:8.5%"><col style="width:10%"><col style="width:7.5%"><col style="width:12%"><col style="width:8.5%"><col style="width:7.5%"><col style="width:11.5%"><col style="width:8%"></colgroup><thead><tr><th class="cell-center">序号</th><th>计费项名称</th><th>业务类型</th><th>币种</th><th>单位</th><th>计费节点</th><th>关联报价</th><th>备注</th><th class="cell-center">启用状态</th><th>创建人</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div>
<div class="table-footer"><div id="totalCountText">共0条记录</div><div class="pager"><div class="pager-group" id="pageBtnGroup"></div><div class="pager-group"><select class="page-size" id="pageSizeSelect" aria-label="每页条数"><option value="10" selected>10条/页</option><option value="20">20条/页</option><option value="50">50条/页</option></select></div><div class="jump-box"><input class="jump-input" id="jumpInput" type="text" inputmode="numeric" maxlength="3" value="1"><button class="jump-btn" id="jumpBtn" type="button">跳转</button></div></div></div>
</section>
</section>
</main>
</div>
</div>
<div class="toast-stack" id="toastStack"></div>
<aside class="page-prd-viewer" id="pagePrdViewer" aria-hidden="true">
  <div class="page-prd-head">
    <div class="page-prd-head-main">
      <span class="page-prd-badge">PRD</span>
      <div class="page-prd-head-copy">
        <div class="page-prd-head-kicker">页面需求文档</div>
        <div class="page-prd-head-title" id="pagePrdTitle">操作费管理列表页PRD</div>
      </div>
    </div>
    <div class="page-prd-head-actions">
      <button class="page-prd-maximize" id="pagePrdMaximize" type="button" title="最大化"><i class="ri-fullscreen-line"></i></button>
      <button class="page-prd-close" id="pagePrdClose" type="button" aria-label="关闭PRD阅读器"><i class="ri-close-line"></i></button>
    </div>
  </div>
  <div class="page-prd-toolbar">
    <div class="page-prd-toolbar-row">
      <input class="page-prd-search" id="pagePrdSearch" type="text" placeholder="搜索章节/控件名称">
      <button class="page-prd-tool-btn" id="pagePrdLocateBtn" type="button">控件定位模式</button>
    </div>
    <div class="page-prd-toolbar-tip">查看控件说明时，可打开定位模式后点击页面控件，或直接按`Alt+点击控件`跳转到文档对应位置。</div>
    <div class="page-prd-current" id="pagePrdCurrent">当前未定位到具体控件</div>
  </div>
  <div class="page-prd-body">
    <aside class="page-prd-toc" id="pagePrdToc"></aside>
    <div class="page-prd-content" id="pagePrdContent"></div>
  </div>
  <div class="page-prd-resize"></div>
</aside>
  <script src="./assets/js/sdms-header-tabs.js"></script>
  <script src="./assets/js/sdms-sidebar.js"></script>
  <script src="./assets/js/operation-fee-config.js"></script>
  <script>window.PRD_VIEWER_PAGE_KEY = "operation-fee-config";</script>
  <script src="./assets/prd-data/operation-fee-config.prd-content.js"></script>
  <script src="./assets/prd-data/operation-fee-config.prd-map.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad:false,theme:'default'});</script>
  <script src="./assets/js/prd-viewer-core.js"></script>
</body>
</html>
