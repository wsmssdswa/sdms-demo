<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增仓储费</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/storage-fee-create.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side-bar" data-sdms-sidebar data-sidebar-key="finance"></aside>
    <div class="page-shell">
      <div class="header-tabs" data-sdms-header-tabs data-tab-set="finance-editor" data-tab-key="storage-fee-create"></div>
      <main class="content-wrap">
        <section class="page-card">
          <div class="page-card-head">
            <div class="page-title" id="pageTitleLabel">新增仓储费</div>
            <div class="page-actions">
              <button class="btn btn-outline" id="backBtn" type="button">返回</button>
              <button class="btn btn-primary" id="saveBtn" type="button">保存</button>
            </div>
          </div>
          <div class="page-body">
            <div class="form-panel">
              <div class="section-title">基本信息</div>
              <form id="storageFeeForm" novalidate>
                <div class="section-row">
                  <div class="field-group" data-field="feeName">
                    <div class="field-label"><span class="required-star">*</span><span>计费项名称</span></div>
                    <input class="field-control" id="feeName" name="feeName" maxlength="50" placeholder="请输入计费项名称">
                    <div class="field-tip"></div>
                  </div>
                  <div class="field-group" data-field="customer">
                    <div class="field-label"><span class="required-star">*</span><span>客户</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="customer" name="customer">
                        <option value="">请选择客户</option>
                        <option value="深圳市星辰电子商务有限公司">深圳市星辰电子商务有限公司</option>
                        <option value="杭州跨境通供应链管理有限公司">杭州跨境通供应链管理有限公司</option>
                        <option value="广州优品国际贸易有限公司">广州优品国际贸易有限公司</option>
                        <option value="上海锐达物流科技有限公司">上海锐达物流科技有限公司</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>
                  <div class="field-group" data-field="warehouse">
                    <div class="field-label"><span class="required-star">*</span><span>所属仓库</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="warehouse" name="warehouse">
                        <option value="">请选择仓库</option>
                        <option value="波兰海外仓">波兰海外仓</option>
                        <option value="德国海外仓">德国海外仓</option>
                        <option value="深圳保税仓">深圳保税仓</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>
                  <div class="field-group" data-field="unit">
                    <div class="field-label"><span class="required-star">*</span><span>计费维度</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="unit" name="unit">
                        <option value="">请选择计费维度</option>
                        <option value="CBM">CBM</option>
                        <option value="托">托</option>
                        <option value="SKU">SKU</option>
                        <option value="件">件</option>
                        <option value="kg">kg</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>
                  <div class="field-group" data-field="currency">
                    <div class="field-label"><span class="required-star">*</span><span>币种</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="currency" name="currency">
                        <option value="">请选择币种</option>
                        <option value="EUR">EUR</option>
                        <option value="USD">USD</option>
                        <option value="CNY">CNY</option>
                        <option value="GBP">GBP</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>
                  <div class="field-group" data-field="dateRange">
                    <div class="field-label"><span class="required-star">*</span><span>适用时间</span></div>
                    <div class="date-range-wrap">
                      <input class="field-control date-input" id="startDate" type="date" name="startDate">
                      <span class="date-sep">~</span>
                      <input class="field-control date-input" id="endDate" type="date" name="endDate">
                    </div>
                    <div class="field-tip"></div>
                  </div>
                  <div class="field-group" data-field="effectType">
                    <div class="field-label"><span>生效方式</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="effectType" name="effectType">
                        <option value="immediate">立即生效</option>
                        <option value="scheduled">定时生效</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m7 10 5 5 5-5z"></path></svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>
                  <div class="field-group span-2" data-field="remark">
                    <div class="field-label"><span>备注</span></div>
                    <input class="field-control" id="remark" name="remark" maxlength="255" placeholder="请输入备注">
                    <div class="field-tip"></div>
                  </div>
                </div>
              </form>
            </div>
            <div class="fee-layout">
              <div class="fee-layout-left" id="tierSection">
                <div class="tab-section-head">
                  <div class="tab-section-left">
                    <div class="section-title">费用阶梯</div>
                  </div>
                  <button class="btn-add-tier" id="addTierBtn" type="button">+ 新增阶梯</button>
                </div>
                <div class="matrix-table-wrap"><table class="matrix-table" id="tierTable"><thead id="tierHead"></thead><tbody id="tierBody"></tbody></table></div>
              </div>
              <div class="fee-layout-right" id="peakSection">
                <div class="tab-section-head">
                  <div class="tab-section-left">
                    <div class="section-title">旺季附加费</div>
                    <label class="fee-toggle"><input type="checkbox" id="peakEnabledCheck">启用</label>
                  </div>
                  <button class="btn-add-tier" id="addPeakBtn" type="button">+ 新增区间</button>
                </div>
                <div class="matrix-table-wrap" id="peakTableWrap" style="display:none"><table class="matrix-table" id="peakTable"><thead id="peakHead"></thead><tbody id="peakBody"></tbody></table></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <div class="toast-stack" id="toastStack"></div>
  <script src="./assets/js/sdms-header-tabs.js"></script>
  <script src="./assets/js/sdms-sidebar.js"></script>
  <script src="./assets/js/storage-fee-create.js"></script>
</body>
</html>
