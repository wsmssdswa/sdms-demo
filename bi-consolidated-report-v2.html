<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BI综合报表V2</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/bi-consolidated-report-v2.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side-bar" data-sdms-sidebar data-sidebar-key="report"></aside>

    <div class="page-shell">
      <div class="header-tabs">
        <a href="./wms-workbench-v2.html" class="tab-chip"><i class="ri-dashboard-3-line"></i><span>工作台V2</span></a>
        <div class="tab-chip primary"><i class="ri-line-chart-line"></i><span>BI综合报表V2</span><span class="close-mark">×</span></div>
      </div>

      <main class="content-wrap">
        <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>
        <section class="page-card">
          <div class="page-card-head">
            <div class="page-head-title">
              <button id="menuToggle" type="button" class="icon-btn mobile-only" aria-label="打开报表目录"><i class="ri-menu-line"></i></button>
              <div>
                <div class="page-title">BI综合报表</div>
                <div class="page-title-sub">统一报表目录、筛选面板、AI诊断与明细列表，适合仓内运营复盘和评审演示。</div>
              </div>
            </div>
            <div class="head-actions">
              <div id="warehouseSelector" style="position:relative;">
                <button id="warehouseBtn" type="button" class="btn warehouse-selector"><span id="warehouseText">全部仓库</span><i class="ri-arrow-down-s-line"></i></button>
                <div id="warehouseDropdown" class="panel hidden" style="position:absolute;right:0;top:40px;width:272px;z-index:22;box-shadow:var(--shadow-panel);">
                  <div style="padding:12px;border-bottom:1px solid var(--line);"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text-main);"><input id="selectAllWarehouses" type="checkbox" checked><span>全部仓库</span></label></div>
                  <div id="warehouseList" style="padding:8px 12px;display:grid;gap:8px;">
                    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text-main);"><input class="warehouse-checkbox" type="checkbox" value="深圳兴围仓" checked><span>深圳兴围仓</span></label>
                    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text-main);"><input class="warehouse-checkbox" type="checkbox" value="广州白云仓" checked><span>广州白云仓</span></label>
                    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text-main);"><input class="warehouse-checkbox" type="checkbox" value="香港葵涌仓" checked><span>香港葵涌仓</span></label>
                  </div>
                  <div style="padding:12px;border-top:1px solid var(--line);"><button id="applyWarehouseBtn" type="button" class="btn btn-primary" style="width:100%;">确定</button></div>
                </div>
              </div>
              <button id="subscribeBtn" type="button" class="btn btn-default"><i class="ri-rss-line"></i><span>订阅日报</span></button>
            </div>
          </div>

          <div class="report-layout">
            <aside id="sidebar" class="report-side-panel -translate-x-full">
              <div class="directory-head">
                <div class="directory-title">报表目录</div>
              </div>
              <div id="reportMenu" class="report-menu-list"></div>
            </aside>

            <section class="report-stage">
              <section class="panel filter-panel">
                <div class="filter-grid">
                  <div class="filter-item" style="grid-column:span 2;">
                    <label>时间范围<span class="required">*</span></label>
                    <div class="date-range"><input id="startDate" class="form-input" type="date" value="2026-01-01"><span class="divider">~</span><input id="endDate" class="form-input" type="date" value="2026-03-18"></div>
                  </div>
                  <div class="filter-item"><label>客户/货主</label><select id="customer" class="form-input"></select></div>
                  <div class="filter-item">
                    <label id="businessTypeLabel">业务类型</label>
                    <div id="businessTypeSelector" class="multi-select-box">
                      <button id="businessTypeBtn" type="button" class="form-input multi-select-trigger" aria-haspopup="listbox" aria-expanded="false"><span id="businessTypeText">全部业务类型</span></button>
                      <div id="businessTypeDropdown" class="multi-select-dropdown hidden">
                        <div class="multi-select-head"><label class="multi-select-option"><input id="selectAllBusinessTypes" type="checkbox" checked><span>全部业务类型</span></label></div>
                        <div id="businessTypeList" class="multi-select-option-list"></div>
                      </div>
                    </div>
                  </div>
                  <div class="filter-item"><label id="filterALabel">主题维度</label><select id="filterA" class="form-input"></select></div>
                  <div class="filter-item"><label id="filterBLabel">状态</label><select id="filterB" class="form-input"></select></div>
                </div>
                <div class="filter-actions">
                  <div class="quick-range-group"><span class="quick-range-label">快捷时间:</span><button type="button" class="quick-range" data-days="7">近7天</button><button type="button" class="quick-range" data-days="30">近30天</button><button type="button" class="quick-range active" data-days="90">近3个月</button><button type="button" class="quick-range" data-days="180">近半年</button></div>
                  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><button id="resetBtn" type="button" class="btn btn-secondary">重置</button><button id="queryBtn" type="button" class="btn btn-primary">查询</button></div>
                </div>
              </section>
              <section id="statCards" class="stats-grid"></section>

              <section id="timelinessOverviewSection" class="panel timeliness-panel hidden">
                <div class="timeliness-panel-head">
                  <div>
                    <div class="section-title">节点时效总览</div>
                    <div id="timelinessOverviewDesc" class="section-sub" style="margin-top:6px;">当前用于展示选定业务类型在时间范围内的节点时效表现。</div>
                  </div>
                  <div id="timelinessSummaryChips" class="timeliness-chip-row"></div>
                </div>
                <div id="timelinessStageTrack" class="timeliness-stage-track"></div>
              </section>

              <section id="aiAnalysisSection" class="panel ai-inline-panel">
                <div class="ai-inline-head">
                  <div>
                    <div class="ai-inline-eyebrow">AI智能分析</div>
                    <div class="ai-inline-title">基于当前查询范围生成区间结论与优先关注事项</div>
                    <div id="aiScopeText" class="ai-inline-scope">等待读取当前查询范围</div>
                  </div>
                  <div class="ai-inline-actions">
                    <span id="aiStatusBadge" class="ai-status-chip" data-tone="idle"><i class="ri-time-line"></i><span>待分析</span></span>
                    <span id="aiGeneratedAt" class="toolbar-tag">分析口径:当前查询结果</span>
                    <button id="aiAnalyzeBtn" type="button" class="btn btn-primary"><i class="ri-sparkling-2-line"></i><span id="aiAnalyzeBtnText">生成AI分析</span></button>
                    <button id="toggleAiCollapseBtn" type="button" class="btn btn-secondary" aria-controls="aiInlineBody" aria-expanded="true" disabled><i class="ri-arrow-up-s-line"></i><span>收起报告</span></button>
                  </div>
                </div>
                <div id="aiInlineBody" class="ai-inline-body">
                  <div id="aiAnalysisContent"></div>
                </div>
              </section>

              <div id="aiEvidenceModal" class="modal hidden" aria-hidden="true">
                <div id="aiEvidenceBackdrop" class="modal-backdrop"></div>
                <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="aiEvidenceModalTitle">
                  <div class="modal-panel">
                    <div class="modal-head">
                      <div>
                        <div class="modal-eyebrow">AI更多依据</div>
                        <div id="aiEvidenceModalTitle" class="modal-title">区间分析依据详情</div>
                        <div id="aiEvidenceModalScope" class="modal-scope">等待读取当前查询范围</div>
                      </div>
                      <div class="modal-actions">
                        <span id="aiEvidenceModalGeneratedAt" class="toolbar-tag">分析口径:当前查询结果</span>
                        <button id="closeAiEvidenceModalBtn" type="button" class="btn btn-secondary"><i class="ri-close-line"></i><span>关闭</span></button>
                      </div>
                    </div>
                    <div id="aiEvidenceModalBody" class="modal-body"></div>
                  </div>
                </div>
              </div>

              <div id="timelinessDetailModal" class="modal hidden" aria-hidden="true">
                <div id="timelinessDetailBackdrop" class="modal-backdrop"></div>
                <div class="modal-dialog modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="timelinessDetailTitle">
                  <div class="modal-panel timeliness-detail-panel">
                    <div class="modal-head">
                      <div>
                        <div class="modal-eyebrow">节点订单明细</div>
                        <div id="timelinessDetailTitle" class="modal-title">节点时效详情</div>
                        <div id="timelinessDetailScope" class="modal-scope">--</div>
                      </div>
                      <div class="modal-actions">
                        <span id="timelinessDetailBusinessTag" class="toolbar-tag">--</span>
                        <button id="closeTimelinessDetailBtn" type="button" class="btn btn-secondary"><i class="ri-close-line"></i><span>关闭</span></button>
                      </div>
                    </div>
                    <div class="modal-body timeliness-detail-body">
                      <div id="timelinessDetailStats" class="timeliness-detail-stats"></div>
                      <div class="timeliness-detail-table-wrap">
                        <table id="timelinessDetailTable" class="data-table timeliness-detail-table">
                          <thead id="timelinessDetailHead"></thead>
                          <tbody id="timelinessDetailBody"></tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <section class="panel table-panel">
                <div class="table-head"><div><div class="section-title">明细数据</div><div id="tableTitle" class="chart-name" style="margin-top:8px;">--</div></div><div class="table-head-actions"><button id="exportBtn" type="button" class="btn btn-secondary"><i class="ri-download-2-line"></i><span>导出</span></button><div class="table-search-box"><input id="keywordInput" class="form-input" type="text" maxlength="50" placeholder="搜索编号/客户/仓库/业务类型"><i class="ri-search-line"></i></div></div></div>
                <div id="tableToolbar" class="table-toolbar"></div>
                <div class="table-wrap">
                  <table id="detailTable" class="data-table">
                    <thead id="tableHead">
                      <tr><th>编号</th><th>客户/货主</th><th>仓库</th><th>主题标签</th><th class="cell-right">关键值</th><th>更新时间</th><th>状态</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                  </table>
                </div>
                <div class="table-footer"><div>共<span id="totalCount">0</span>条记录，当前显示第<span id="currentStart">0</span>-<span id="currentEnd">0</span>条</div><div class="pager"><button id="prevBtn" type="button" class="btn btn-secondary" disabled>上一页</button><div id="pageNumbers" class="page-number-group"></div><button id="nextBtn" type="button" class="btn btn-secondary" disabled>下一页</button><select id="pageSize" class="form-input" style="width:110px;"><option value="20" selected>20条/页</option><option value="50">50条/页</option><option value="100">100条/页</option></select></div></div>
              </section>
            </section>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="toastContainer" class="toast-stack"></div>

  <script src="./assets/js/sdms-sidebar.js"></script>
  <script src="./assets/js/bi-consolidated-report-v2.js"></script>
</body>
</html>
