<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>费用流水</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/sdms-comp-config-list.css">
  <link rel="stylesheet" href="./assets/css/account-list.css">
</head>
<body>
<div class="app-shell">
<aside class="side-bar" data-sdms-sidebar data-sidebar-key="finance"></aside>
<div class="page-shell">
<div class="header-tabs" data-sdms-header-tabs data-tab-set="finance-editor" data-tab-key="account" data-include-tools="true" data-user-name="张三"></div>
<main class="content-wrap">
<section class="page-card">

<!-- 筛选区 -->
<section class="filter-panel">
  <div class="query-row">
    <div class="filter-control">
      <span class="filter-inline-label">客户名称</span>
      <input class="filter-input" id="customerInput" type="text" placeholder="请输入客户名称">
    </div>
    <div class="filter-control">
      <span class="filter-inline-label">流水类型</span>
      <div class="select-wrap">
        <select class="filter-select" id="txTypeSelect">
          <option value="">全部</option>
          <option value="recharge">充值</option>
          <option value="deduct">扣款</option>
          <option value="withdraw">提现</option>
          <option value="adjust">调整</option>
        </select>
        <svg class="select-arrow" width="10" height="6" viewBox="0 0 10 6"><path d="M0 0l5 6 5-6z" fill="currentColor"/></svg>
      </div>
    </div>
      <button class="btn btn-primary" type="button" id="queryBtn">查询</button>
      <button class="btn btn-default" type="button" id="resetBtn">重置</button>
  </div>
</section>

<!-- 流水表格 -->
<section class="table-panel">
  <div class="table-wrap">
    <table class="list-table">
      <colgroup>
        <col style="width:10%">
        <col style="width:8%">
        <col style="width:12%">
        <col style="width:14%">
        <col style="width:20%">
        <col style="width:10%">
        <col style="width:12%">
        <col style="width:14%">
      </colgroup>
      <thead>
        <tr>
          <th>流水号</th>
          <th>类型</th>
          <th>客户名称</th>
          <th>关联费用单</th>
          <th>费用项</th>
          <th>金额</th>
          <th>变动后余额</th>
          <th>时间</th>
        </tr>
      </thead>
      <tbody id="transactionBody"></tbody>
    </table>
  </div>
  <div class="table-footer">
    <div id="totalCountText">共0条记录</div>
    <div class="pager">
      <div class="pager-group" id="pageBtnGroup"></div>
      <div class="pager-group">
        <select class="page-size" id="pageSizeSelect" aria-label="每页条数">
          <option value="10" selected>10条/页</option>
          <option value="20">20条/页</option>
          <option value="50">50条/页</option>
        </select>
      </div>
      <div class="jump-box">
        <input class="jump-input" id="jumpInput" type="text" inputmode="numeric" maxlength="3" value="1">
        <button class="jump-btn" id="jumpBtn" type="button">跳转</button>
      </div>
    </div>
  </div>
</section>

</section>
</main>
</div>
</div>
<div class="toast-stack" id="toastStack"></div>
<script src="./assets/js/sdms-header-tabs.js"></script>
<script src="./assets/js/sdms-sidebar.js"></script>
<script src="./assets/js/account-list.js"></script>
</body>
</html>
