<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增操作费</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/operation-fee-create.css">
  <link rel="stylesheet" href="./assets/css/prd-viewer.css">
  <link rel="stylesheet" href="./assets/css/prd-annotation.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side-bar" data-sdms-sidebar data-sidebar-key="finance"></aside>

    <div class="page-shell">
      <div class="header-tabs" data-sdms-header-tabs data-tab-set="finance-editor" data-tab-key="operation-fee-create" data-include-prd-entry="true" data-prd-entry-text="查看PRD"></div>

      <main class="content-wrap">
        <section class="page-card">
          <div class="page-card-head">
            <div class="page-title" id="pageTitleLabel">新增操作费</div>
            <div class="page-actions">
              <button class="btn btn-outline" id="simulateBtn" type="button">费用试算</button>
              <button class="btn btn-primary" id="saveBtn" type="button">保存</button>
            </div>
          </div>

          <div class="page-body">
            <div class="form-panel">
              <div class="section-title">基本信息</div>

              <form id="operationFeeForm" novalidate>
                <div class="section-row">
                  <div class="field-group" data-field="chargeName">
                    <div class="field-label"><span class="required-star">*</span><span>计费项名称</span></div>
                    <input class="field-control" id="chargeName" name="chargeName" maxlength="50" value="卸货费" placeholder="请输入计费项名称">
                    <div class="field-tip"></div>
                  </div>

                  <div class="field-group" data-field="feeItem">
                    <div class="field-label"><span class="required-star">*</span><span>费用项</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="feeItem" name="feeItem">
                        <option value="">请选择费用项</option>
                        <option value="XHF-卸货费" selected>XHF-卸货费</option>
                        <option value="RHF-入货费">RHF-入货费</option>
                        <option value="SHF-上架费">SHF-上架费</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="m7 10 5 5 5-5z"></path>
                      </svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>

                  <div class="field-group" data-field="warehouse">
                    <div class="field-label"><span class="required-star">*</span><span>所属仓库</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="warehouse" name="warehouse">
                        <option value="">请选择仓库</option>
                        <option value="波兰海外仓" selected>波兰海外仓</option>
                        <option value="德国海外仓">德国海外仓</option>
                        <option value="深圳保税仓">深圳保税仓</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="m7 10 5 5 5-5z"></path>
                      </svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>

                  <div class="field-group" data-field="inboundType">
                    <div class="field-label"><span class="required-star">*</span><span>入库类型</span></div>
                    <div class="tag-select" id="inboundTypeSelect">
                      <button class="tag-select-trigger" id="inboundTypeTrigger" type="button" aria-expanded="false">
                        <span class="tag-value">
                          <span id="inboundTypeLabel">尾程大货入库</span>
                          <span class="tag-close">×</span>
                        </span>
                        <svg class="w-[12px] h-[12px] text-[#8594a8]" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                          <path d="m7 10 5 5 5-5z"></path>
                        </svg>
                      </button>
                      <div class="tag-select-menu" id="inboundTypeMenu">
                        <div class="tag-option" data-value="尾程大货入库">尾程大货入库</div>
                        <div class="tag-option" data-value="尾程小货入库">尾程小货入库</div>
                        <div class="tag-option" data-value="干线入仓">干线入仓</div>
                      </div>
                    </div>
                    <div class="field-tip"></div>
                  </div>

                  <div class="field-group" data-field="currency">
                    <div class="field-label"><span class="required-star">*</span><span>币种</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="currency" name="currency">
                        <option value="">请选择币种</option>
                        <option value="EUR" selected>EUR</option>
                        <option value="USD">USD</option>
                        <option value="CNY">CNY</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="m7 10 5 5 5-5z"></path>
                      </svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>

                  <div class="field-group" data-field="measureUnit">
                    <div class="field-label"><span class="required-star">*</span><span>计量单位</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="measureUnit" name="measureUnit">
                        <option value="">请选择计量单位</option>
                        <option value="kg" selected>kg</option>
                        <option value="件">件</option>
                        <option value="托">托</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="m7 10 5 5 5-5z"></path>
                      </svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>

                  <div class="field-group" data-field="chargeUnit">
                    <div class="field-label"><span class="required-star">*</span><span>默认计费单位</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="chargeUnit" name="chargeUnit">
                        <option value="">请选择默认计费单位</option>
                        <option value="柜">柜</option>
                        <option value="箱" selected>箱</option>
                        <option value="托">托</option>
                        <option value="kg">kg</option>
                        <option value="SKU">SKU</option>
                        <option value="CBM" disabled>CBM(暂未开放)</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="m7 10 5 5 5-5z"></path>
                      </svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>

                  <div class="field-group" data-field="chargeNode">
                    <div class="field-label"><span class="required-star">*</span><span>计费节点</span></div>
                    <div class="select-wrap">
                      <select class="field-select" id="chargeNode" name="chargeNode">
                        <option value="">请选择计费节点</option>
                        <option value="卸货完成" selected>卸货完成</option>
                        <option value="收货完成">收货完成</option>
                        <option value="上架完成">上架完成</option>
                      </select>
                      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <path d="m7 10 5 5 5-5z"></path>
                      </svg>
                    </div>
                    <div class="field-tip"></div>
                  </div>

                  <div class="field-group span-2" data-field="remark">
                    <div class="field-label"><span>备注</span></div>
                    <input class="field-control" id="remark" name="remark" maxlength="255" placeholder="请输入备注">
                    <div class="field-tip"></div>
                  </div>
                </div>
              </form>

              <div class="rules-head">
                <div class="section-title rule mb-0">计费规则</div>
                <button class="btn-mini" id="groupBtn" type="button">编组</button>
              </div>

              <div class="rules-card">
                <div class="rules-table-head">
                  <div>规则说明</div>
                  <div>操作</div>
                </div>
                <div id="ruleList"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <div class="trial-mask" id="trialFeeModal" aria-hidden="true">
    <div class="trial-dialog" role="dialog" aria-modal="true" aria-labelledby="trialModalTitle">
      <div class="trial-header">
        <div class="trial-title" id="trialModalTitle">费用试算-卸货费</div>
        <button class="trial-close" id="trialModalClose" type="button" aria-label="关闭">×</button>
      </div>

      <div class="trial-body">
        <div class="trial-toolbar">
          <div class="trial-form-row">
            <div class="trial-form-field">
              <div class="trial-form-label"><span class="required-star">*</span><span>试算单号</span></div>
              <div class="trial-form-inline">
                <input class="trial-input" id="trialOrderNo" type="text" maxlength="50" value="SNBWAW250625A63149" placeholder="请输入试算单号">
                <button class="trial-run-btn" id="trialRunBtn" type="button">试算</button>
              </div>
            </div>
          </div>
          <div class="trial-inline-status" id="trialInlineStatus"></div>
          <div class="trial-summary" id="trialSummary"></div>
        </div>

        <div class="trial-board">
          <div class="trial-board-head" id="trialBoardHead">
            <div>规则说明</div>
            <div class="align-right">试算费用（€）</div>
          </div>
          <div class="trial-board-scroll" id="trialBoardScroll"></div>
          <div class="trial-total">
            <div class="trial-total-label">合计费用</div>
            <div class="trial-total-value" id="trialTotalValue">€0.00</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="editor-mask" id="ruleEditorModal" aria-hidden="true">
    <div class="editor-dialog" role="dialog" aria-modal="true" aria-labelledby="ruleEditorTitle">
      <div class="editor-header">
        <div class="editor-title" id="ruleEditorTitle">编辑规则</div>
        <button class="editor-close" id="ruleEditorClose" type="button" aria-label="关闭">×</button>
      </div>

      <div class="editor-tabs" id="editorTabBar"></div>

      <div class="editor-body">
        <section class="editor-section">
          <div class="editor-section-title">主规则</div>
          <div class="editor-panel">
            <div class="editor-panel-head editor-primary-head">
              <div>条件变量</div>
              <div>触发条件</div>
              <div class="editor-cell-center">操作</div>
            </div>
            <div id="editorPrimaryRows"></div>
            <button class="editor-add-inline" id="addPrimaryConditionBtn" type="button">+ 新增条件</button>
          </div>
        </section>

        <section class="editor-section">
          <div class="editor-section-title">副规则</div>
          <div class="editor-panel">
            <div class="editor-panel-head editor-secondary-head">
              <div></div>
              <div>条件变量</div>
              <div>触发条件</div>
              <div><span class="editor-required">*</span>计费单位</div>
              <div>减免量</div>
              <div><span class="editor-required">*</span>单位数量</div>
              <div>进位</div>
              <div><span class="editor-required">*</span>单价</div>
              <div>基础收费</div>
              <div>最低收费</div>
              <div>最高收费</div>
              <div class="editor-cell-center">操作</div>
            </div>
            <div id="editorSecondaryRows"></div>
            <button class="editor-add-inline" id="addSecondaryRuleBtn" type="button">+ 新增副规则</button>
          </div>
        </section>
      </div>

      <div class="editor-footer">
        <button class="btn btn-outline" id="editorCancelBtn" type="button">取消</button>
        <button class="btn btn-primary" id="editorConfirmBtn" type="button">确定</button>
      </div>
    </div>
  </div>
  <aside class="page-prd-viewer" id="pagePrdViewer" aria-hidden="true">
    <div class="page-prd-head">
      <div class="page-prd-head-main">
        <span class="page-prd-badge">PRD</span>
        <div class="page-prd-head-copy">
          <div class="page-prd-head-kicker">页面需求文档</div>
          <div class="page-prd-head-title" id="pagePrdTitle">新增/编辑操作费页面PRD</div>
        </div>
      </div>
      <button class="page-prd-close" id="pagePrdClose" type="button" aria-label="关闭PRD阅读器">×</button>
    </div>
    <div class="page-prd-toolbar">
      <div class="page-prd-toolbar-row">
        <input class="page-prd-search" id="pagePrdSearch" type="text" placeholder="搜索章节/控件名称">
        <button class="page-prd-tool-btn" id="pagePrdLocateBtn" type="button">控件定位模式</button>
      </div>
      <div class="page-prd-toolbar-tip">查看控件说明时，可打开定位模式后点击页面控件，或直接按`Alt+点击控件`跳转到文档对应位置。</div>
      <div class="page-prd-current" id="pagePrdCurrent">当前未定位到具体控件</div>
    </div>
    <div class="page-prd-body">
      <aside class="page-prd-toc" id="pagePrdToc"></aside>
      <div class="page-prd-content" id="pagePrdContent"></div>
    </div>
  </aside>

  <script src="./assets/js/sdms-header-tabs.js"></script>
  <script src="./assets/js/sdms-sidebar.js"></script>
  <script src="./assets/js/operation-fee-create.js"></script>
  <script>window.PRD_VIEWER_PAGE_KEY = "operation-fee-create";</script>
  <script src="./assets/prd-data/operation-fee-create.prd-content.js"></script>
  <script src="./assets/prd-data/operation-fee-create.prd-map.js"></script>
  <script src="./assets/js/prd-viewer-core.js"></script>
  <script src="./assets/prd-annotations/operation-fee-create.annotations.js"></script>
  <script src="./assets/js/prd-annotation.js"></script>
</body>
</html>
