<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>干线订单列表</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/trunk-order-list.css">
  <link rel="stylesheet" href="./assets/css/prd-viewer.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side-bar" data-sdms-sidebar data-sidebar-key="business"></aside>
    <div class="page-shell">
      <div class="header-tabs" data-sdms-header-tabs data-tab-set="business" data-tab-key="trunk-order-list" data-include-tools="true" data-include-prd-entry="true" data-prd-entry-text="查看PRD" data-user-name="杨鑫"></div>
      <main class="content-wrap">
        <section class="page-card">
          <section class="filter-panel filter-panel-combined">
            <div class="status-tabs" id="statusTabs"></div>
            <div class="query-row">
              <div class="search-box">
                <input class="search-input" id="keywordInput" type="text" maxlength="50" placeholder="请输入关键字搜索">
                <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M10.5 4a6.5 6.5 0 1 1 0 13 6.5 6.5 0 0 1 0-13Zm0 1.8a4.7 4.7 0 1 0 0 9.4 4.7 4.7 0 0 0 0-9.4Zm8.7 11.9 1.8 1.8-1.3 1.3-1.8-1.8 1.3-1.3Z"></path>
                </svg>
              </div>
              <select class="query-select" id="warehouseSelect" aria-label="仓库">
                <option value="">仓库</option>
                <option value="深圳兴围仓">深圳兴围仓</option>
                <option value="广州鸿祥仓">广州鸿祥仓</option>
                <option value="深圳九通仓">深圳九通仓</option>
              </select>
              <select class="query-select" id="mergeTypeSelect" aria-label="订单类型">
                <option value="">全部订单</option>
                <option value="normal">普通订单</option>
                <option value="parent">拼单主单</option>
                <option value="child">子单</option>
              </select>
              <button class="btn btn-primary" id="queryBtn" type="button">查询</button>
              <button class="btn btn-default" id="resetBtn" type="button">重置</button>
            </div>
          </section>

          <section class="list-panel">
            <div class="list-header">
              <div>基本信息</div>
              <div>航班信息</div>
              <div>货主信息</div>
              <div>人员信息</div>
            </div>
            <div class="order-card-list" id="orderCardList"></div>
            <div class="table-footer">
              <div id="totalCountText">共0条记录</div>
              <div class="pager">
                <div class="pager-group" id="pageBtnGroup"></div>
                <div class="pager-group">
                  <select class="page-size" id="pageSizeSelect" aria-label="每页条数">
                    <option value="20" selected>20条/页</option>
                    <option value="50">50条/页</option>
                    <option value="100">100条/页</option>
                  </select>
                </div>
                <div class="jump-box">
                  <span>前往</span>
                  <input class="jump-input" id="jumpInput" type="text" inputmode="numeric" maxlength="3" value="1">
                  <span>页</span>
                </div>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <aside class="page-prd-viewer" id="pagePrdViewer" aria-hidden="true">
    <div class="page-prd-head">
      <div class="page-prd-head-main">
        <span class="page-prd-badge">PRD</span>
        <div class="page-prd-head-copy">
          <div class="page-prd-head-kicker">页面需求文档</div>
          <div class="page-prd-head-title" id="pagePrdTitle">干线订单列表PRD</div>
        </div>
      </div>
      <div class="page-prd-head-actions">
        <button class="page-prd-maximize" id="pagePrdMaximize" type="button" title="最大化"><i class="ri-fullscreen-line"></i></button>
        <button class="page-prd-close" id="pagePrdClose" type="button" aria-label="关闭PRD阅读器"><i class="ri-close-line"></i></button>
      </div>
    </div>
    <div class="page-prd-toolbar">
      <div class="page-prd-toolbar-row">
        <input class="page-prd-search" id="pagePrdSearch" type="text" placeholder="搜索章节/控件名称">
        <button class="page-prd-tool-btn" id="pagePrdLocateBtn" type="button">控件定位模式</button>
      </div>
      <div class="page-prd-toolbar-tip">查看控件说明时，可打开定位模式后点击页面控件，或直接按`Alt+点击控件`跳转到文档对应位置。</div>
      <div class="page-prd-current" id="pagePrdCurrent">当前未定位到具体控件</div>
    </div>
    <div class="page-prd-body">
      <aside class="page-prd-toc" id="pagePrdToc"></aside>
      <div class="page-prd-content" id="pagePrdContent"></div>
    </div>
    <div class="page-prd-resize"></div>
  </aside>

  <script src="./assets/js/sdms-header-tabs.js"></script>
  <script src="./assets/js/sdms-sidebar.js"></script>
  <script src="./assets/js/trunk-order-list.js"></script>
  <script>window.PRD_VIEWER_PAGE_KEY = "trunk-order-list";</script>
  <script src="./assets/prd-data/trunk-order-list.prd-content.js"></script>
  <script src="./assets/prd-data/trunk-order-list.prd-map.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad:false,theme:'default'});</script>
  <script src="./assets/js/prd-viewer-core.js"></script>
</body>
</html>
