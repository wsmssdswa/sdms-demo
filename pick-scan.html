<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>扫码挑货 — 千仓SDMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --nav-bg: #0F2B46;
      --nav-bg-end: #1A3F66;
      --brand: #2B6CB0;
      --brand-bright: #3B82F6;
      --surface: #FFFFFF;
      --surface-alt: #F7F8FA;
      --text-primary: #1A202C;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --divider: #E2E8F0;
      --status-pending: #94A3B8;
      --status-active: #3B82F6;
      --status-done: #22C55E;
      --status-warn: #F59E0B;
      --danger: #EF4444;
      --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
      --radius: 10px;
      --radius-sm: 6px;
      --font-ui: 'DM Sans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', 'Cascadia Code', monospace;
      --frame-max: 100%;
      --content-pad: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--font-ui);
      background: #EDF0F4;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .pda-frame {
      width: 100%;
      max-width: var(--frame-max);
      min-height: 100vh;
      background: var(--surface-alt);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶部导航栏 ── */
    .nav-bar {
      background: linear-gradient(135deg, var(--nav-bg) 0%, var(--nav-bg-end) 100%);
      color: #fff;
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-bar .back-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 8px; transition: background 0.15s;
    }
    .nav-bar .back-btn:active { background: rgba(255,255,255,0.12); }
    .nav-bar .back-btn svg { width: 20px; height: 20px; }
    .nav-bar .title {
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.5px;
    }
    .nav-bar .placeholder { width: 32px; }

    /* ── 内容区 ── */
    .content {
      flex: 1;
      padding: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 72px;
      display: flex;
      flex-direction: column;
    }

    /* ── 状态英雄区 ── */
    .status-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 16px;
      text-align: center;
    }
    .hero-icon-wrap {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
      background: rgba(59, 130, 246, 0.1);
    }
    .hero-icon-wrap svg { width: 28px; height: 28px; fill: none; stroke: #3B82F6; }
    .hero-main-text {
      font-size: 16px;
      font-weight: 700;
      color: #3B82F6;
      margin-bottom: 4px;
    }
    .hero-sub-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ── 面板通用 ── */
    .panel { display: none; flex-direction: column; }
    .panel.active { display: flex; }

    /* ── 大箱面板 ── */
    .carton-list {
      padding: 0 var(--content-pad);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .carton-item {
      display: flex;
      align-items: center;
      padding: 14px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      gap: 10px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
    }
    .carton-item:active { transform: scale(0.985); box-shadow: var(--shadow-md); }
    .carton-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .carton-dot.pending { border: 2px solid #CBD5E1; background: transparent; }
    .carton-dot.partial { background: #F59E0B; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15); }
    .carton-dot.done { background: #22C55E; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15); }
    .carton-info { flex: 1; min-width: 0; }
    .carton-no {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .carton-item.done .carton-no { color: var(--text-muted); text-decoration: line-through; }
    .carton-progress {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .carton-item.done .carton-progress { color: var(--status-done); }
    .carton-arrow {
      width: 16px; height: 16px;
      fill: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── 包裹面板 ── */
    .parcel-list {
      padding: 4px 0;
    }
    .parcel-item {
      display: flex;
      align-items: center;
      padding: 12px var(--content-pad);
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s;
      background: var(--surface);
    }
    .parcel-item + .parcel-item {
      border-top: 1px solid #F1F5F9;
    }
    .parcel-item.picked {
      background: #F8FAF8;
    }
    .parcel-item:active { background: var(--surface-alt); }
    .parcel-item.picked:active { background: #EFF8EF; }
    .parcel-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .parcel-dot.unpicked { border: 2px solid #CBD5E1; background: transparent; }
    .parcel-dot.picked-dot { background: #22C55E; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15); }
    .parcel-no {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
    }
    .parcel-item.picked .parcel-no {
      color: var(--text-muted);
      text-decoration: line-through;
    }
    .parcel-picked-tag {
      display: none;
      font-size: 11px;
      font-weight: 600;
      color: #22C55E;
      flex-shrink: 0;
    }
    .parcel-item.picked .parcel-picked-tag { display: inline; }

    /* ── 扫码输入栏（固定底部） ── */
    .scan-input-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: var(--frame-max);
      width: 100%;
      background: var(--surface);
      border-top: 1px solid var(--divider);
      padding: 10px var(--content-pad);
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .scan-input-wrap {
      flex: 1;
      position: relative;
    }
    .scan-input-wrap .icon-left {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      opacity: 0.4;
    }
    .scan-input {
      width: 100%;
      background: var(--surface-alt);
      border: 1.5px solid var(--divider);
      border-radius: 8px;
      padding: 11px 40px 11px 36px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .scan-input::placeholder { color: var(--text-muted); font-family: var(--font-ui); font-size: 13px; }
    .scan-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(43, 108, 176, 0.1); }
    .scan-submit-btn {
      width: 40px; height: 40px;
      border: none;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-bright) 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .scan-submit-btn:active { transform: scale(0.92); }
    .scan-submit-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── 错误状态 ── */
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 40px;
      text-align: center;
    }
    .error-state .error-icon {
      width: 64px; height: 64px;
      background: rgba(239, 68, 68, 0.08);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .error-state .error-icon svg { width: 32px; height: 32px; fill: #EF4444; }
    .error-state .error-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .error-state .error-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .error-state .error-btn {
      padding: 10px 28px;
      background: var(--brand); color: #fff; border: none;
      border-radius: 8px; font-family: var(--font-ui);
      font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* ── Toast容器 ── */
    .toast-container {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      max-width: var(--frame-max);
      width: calc(100% - 32px);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }
    .toast {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
    .toast.warn { background: #FFFBEB; color: #92400E; border: 1px solid #FDE68A; }
    .toast.info { background: #EFF6FF; color: #1E40AF; border: 1px solid #BFDBFE; }
    .toast svg { width: 16px; height: 16px; flex-shrink: 0; }
    .toast.success svg { fill: #22C55E; }
    .toast.warn svg { fill: #F59E0B; }
    .toast.info svg { fill: #3B82F6; }

    /* ── 响应式断点 ── */
    @media (min-width: 481px) {
      :root { --frame-max: 480px; --content-pad: 16px; }
      .pda-frame { box-shadow: 0 0 60px rgba(15, 23, 42, 0.12); }
    }
    @media (min-width: 769px) {
      :root { --frame-max: 520px; --content-pad: 20px; }
    }
    @media (min-width: 1200px) {
      :root { --frame-max: 560px; }
    }
  </style>
</head>
<body>
  <div class="pda-frame">
    <!-- 顶部导航 -->
    <div class="nav-bar">
      <div class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </div>
      <div class="title" id="navTitle">—</div>
      <div class="placeholder"></div>
    </div>

    <!-- 内容区 -->
    <div class="content" id="mainContent">
      <!-- 错误状态 -->
      <div class="error-state" id="errorState" style="display:none">
        <div class="error-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        </div>
        <div class="error-title" id="errorTitle">任务不存在</div>
        <div class="error-desc" id="errorDesc">请返回任务列表重试</div>
        <button class="error-btn" onclick="goBack()">返回列表</button>
      </div>

      <!-- 状态提示 -->
      <div class="status-hero" id="statusHero">
        <div class="hero-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <div class="hero-main-text" id="heroMainText">请扫大箱号</div>
        <div class="hero-sub-text" id="heroSubText">也可点击下方列表手动操作</div>
      </div>

      <!-- 大箱面板 -->
      <div class="panel active" id="cartonView">
        <div class="carton-list" id="cartonList"></div>
      </div>

      <!-- 包裹面板 -->
      <div class="panel" id="parcelView">
        <div class="parcel-list" id="parcelList"></div>
      </div>
    </div>

    <!-- 扫码输入栏 -->
    <div class="scan-input-bar">
      <div class="scan-input-wrap">
        <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
          <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"></path>
          <line x1="7" y1="12" x2="17" y2="12"></line>
        </svg>
        <input class="scan-input" id="scanInput" type="text" placeholder="扫描或输入条码"
               onkeydown="if(event.key==='Enter')onScan()">
      </div>
      <button class="scan-submit-btn" onclick="onScan()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <!-- Toast容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 共享数据层 -->
  <script src="./assets/js/pick-tool-data.js"></script>

  <script>
    /* ── 全局状态 ── */
    var currentTask = null;
    var activeCartonNo = null; // 当前查看的大箱号
    var currentView = 'carton'; // 'carton' 或 'parcel'

    /* ── DOM引用 ── */
    var scanInput = document.getElementById('scanInput');
    var navTitle = document.getElementById('navTitle');
    var heroMainText = document.getElementById('heroMainText');
    var heroSubText = document.getElementById('heroSubText');
    var cartonView = document.getElementById('cartonView');
    var parcelView = document.getElementById('parcelView');
    var cartonList = document.getElementById('cartonList');
    var parcelList = document.getElementById('parcelList');
    var errorState = document.getElementById('errorState');
    var statusHero = document.getElementById('statusHero');
    var toastContainer = document.getElementById('toastContainer');

    /* ── 初始化 ── */
    document.addEventListener('DOMContentLoaded', function () {
      loadTask();
      autoFocusInput();
    });

    /* ── 加载任务 ── */
    function loadTask() {
      var params = new URLSearchParams(window.location.search);
      var taskId = params.get('taskId');
      if (!taskId) {
        showError('参数缺失', '缺少任务ID，请返回任务列表');
        return;
      }
      var task = PickTool.getTask(taskId);
      if (!task) {
        showError('任务不存在', '该任务可能已被删除，请返回重试');
        return;
      }
      currentTask = task;
      navTitle.textContent = task.orderNo;
      renderProgress();
      renderCartonView();
    }

    function showError(title, desc) {
      errorState.style.display = '';
      statusHero.style.display = 'none';
      cartonView.className = 'panel';
      parcelView.className = 'panel';
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorDesc').textContent = desc;
    }

    /* ── 渲染大箱列表 ── */
    function renderCartonView() {
      if (!currentTask) return;
      currentTask = PickTool.getTask(currentTask.id);

      var html = '';
      currentTask.cartons.forEach(function (carton) {
        var picked = carton.parcels.filter(function (p) { return p.picked; }).length;
        var total = carton.parcels.length;
        var dotClass = picked === 0 ? 'pending' : picked === total ? 'done' : 'partial';
        var itemClass = picked === total ? 'carton-item done' : 'carton-item';

        html +=
          '<div class="' + itemClass + '" onclick="selectCarton(\'' + esc(carton.cartonNo) + '\')">' +
            '<div class="carton-dot ' + dotClass + '"></div>' +
            '<div class="carton-info">' +
              '<div class="carton-no">' + esc(carton.cartonNo) + '</div>' +
            '</div>' +
            '<span class="carton-progress">' + picked + '/' + total + '</span>' +
            '<svg class="carton-arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>' +
          '</div>';
      });
      cartonList.innerHTML = html;
    }

    /* ── 渲染包裹列表 ── */
    function renderParcelView() {
      if (!currentTask || !activeCartonNo) return;
      currentTask = PickTool.getTask(currentTask.id);

      var carton = currentTask.cartons.find(function (c) { return c.cartonNo === activeCartonNo; });
      if (!carton) return;

      var picked = carton.parcels.filter(function (p) { return p.picked; }).length;
      var total = carton.parcels.length;
      heroSubText.textContent = carton.cartonNo + ' · ' + picked + '/' + total + ' 已挑出';

      var html = '';
      carton.parcels.forEach(function (p) {
        var cls = p.picked ? 'parcel-item picked' : 'parcel-item';
        var dotCls = p.picked ? 'parcel-dot picked-dot' : 'parcel-dot unpicked';
        html +=
          '<div class="' + cls + '" onclick="toggleParcel(\'' + esc(carton.cartonNo) + '\',\'' + esc(p.parcelNo) + '\')">' +
            '<div class="' + dotCls + '"></div>' +
            '<span class="parcel-no">' + esc(p.parcelNo) + '</span>' +
            '<span class="parcel-picked-tag">已挑</span>' +
          '</div>';
      });
      parcelList.innerHTML = html;
    }

    /* ── 面板切换 ── */
    function selectCarton(cartonNo) {
      activeCartonNo = cartonNo;
      currentView = 'parcel';
      cartonView.className = 'panel';
      parcelView.className = 'panel active';
      heroMainText.textContent = '请扫包裹号';
      renderParcelView();
      renderParcelView();
      autoFocusInput();
    }

    function showCartonView() {
      activeCartonNo = null;
      currentView = 'carton';
      parcelView.className = 'panel';
      cartonView.className = 'panel active';
      heroMainText.textContent = '请扫大箱号';
      renderCartonView();
      renderProgress();
      autoFocusInput();
    }

    /* ── 手动切换包裹状态 ── */
    function toggleParcel(cartonNo, parcelNo) {
      var task = PickTool.getTask(currentTask.id);
      var carton = task.cartons.find(function (c) { return c.cartonNo === cartonNo; });
      if (!carton) return;
      var parcel = carton.parcels.find(function (p) { return p.parcelNo === parcelNo; });
      if (!parcel) return;

      if (parcel.picked) {
        parcel.picked = false;
        parcel.pickedAt = null;
        showToast('已撤销: ' + parcelNo, 'info');
      } else {
        parcel.picked = true;
        parcel.pickedAt = new Date().toISOString();
        showToast('已挑出: ' + parcelNo, 'success');
      }

      var stats = PickTool.getTaskStats(task);
      task.status = stats.done ? 'completed' : 'in_progress';
      PickTool.updateTask(task);
      currentTask = PickTool.getTask(currentTask.id);

      renderParcelView();
      renderProgress();
      autoFocusInput();
    }

    /* ── 渲染进度 ── */
    function renderProgress() {
      if (!currentTask) return;
      var stats = PickTool.getTaskStats(currentTask);
      heroSubText.textContent = stats.picked + '/' + stats.total + ' 已挑出';
    }

    /* ── 扫码处理（统一匹配） ── */
    function onScan() {
      if (!currentTask) return;
      var code = scanInput.value.trim().toUpperCase();
      if (!code) return;
      scanInput.value = '';

      // 1. 先匹配箱号
      var matchedCarton = currentTask.cartons.find(function (c) { return c.cartonNo === code; });
      if (matchedCarton) {
        selectCarton(code);
        var unpicked = matchedCarton.parcels.filter(function (p) { return !p.picked; }).length;
        if (unpicked > 0) {
          showToast('该箱有' + unpicked + '个包裹需挑出', 'info');
        } else {
          showToast('该箱已全部挑出', 'success');
        }
        return;
      }

      // 2. 匹配包裹
      var found = null;
      currentTask.cartons.forEach(function (c) {
        var p = c.parcels.find(function (p) { return p.parcelNo === code; });
        if (p) found = { carton: c, parcel: p };
      });

      if (!found) {
        showToast('未找到该箱号或包裹号', 'warn');
        autoFocusInput();
        return;
      }

      if (found.parcel.picked) {
        showToast('该包裹已挑出', 'info');
        autoFocusInput();
        return;
      }

      // 标记挑出
      PickTool.pickParcel(currentTask.id, found.carton.cartonNo, code);
      currentTask = PickTool.getTask(currentTask.id);
      showToast('请挑出: ' + code, 'success');

      // 如果不在该箱的包裹面板，自动切换过去
      if (activeCartonNo !== found.carton.cartonNo) {
        selectCarton(found.carton.cartonNo);
      } else {
        renderParcelView();
      }
      renderProgress();

      // 检查该箱是否全部完成
      var carton = currentTask.cartons.find(function (c) { return c.cartonNo === found.carton.cartonNo; });
      var allDone = carton.parcels.every(function (p) { return p.picked; });
      if (allDone) {
        showToast(found.carton.cartonNo + ' 已全部挑出', 'success');
      }

      autoFocusInput();
    }

    /* ── Toast ── */
    var TOAST_ICONS = {
      success: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',
      warn: '<svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>',
      info: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>'
    };

    function showToast(msg, type) {
      type = type || 'info';
      var el = document.createElement('div');
      el.className = 'toast ' + type;
      el.innerHTML = TOAST_ICONS[type] + '<span>' + esc(msg) + '</span>';
      toastContainer.appendChild(el);
      requestAnimationFrame(function () { el.classList.add('show'); });
      setTimeout(function () {
        el.classList.remove('show');
        setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
      }, 2000);
    }

    /* ── 导航 ── */
    function goBack() {
      window.location.href = 'pick-task-list.html';
    }

    /* ── 自动聚焦 ── */
    function autoFocusInput() {
      setTimeout(function () { scanInput.focus(); }, 50);
    }

    /* ── 工具函数 ── */
    function esc(s) {
      var div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
