<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报价单预览</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/quotation-preview.css">
</head>
<body>
  <div class="app-shell">
    <aside class="side-bar" data-sdms-sidebar data-sidebar-key="finance"></aside>
    <div class="page-shell">
      <div class="header-tabs" data-sdms-header-tabs data-tab-set="finance-editor" data-tab-key="quotation-preview"></div>
      <main class="content-wrap">
        <section class="page-card">
          <div class="preview-header">
            <div class="preview-title-bar">
              <div class="preview-info">
                <h1 id="previewSchemeName" class="preview-title">报价方案名称</h1>
                <div id="previewMeta" class="preview-meta"></div>
              </div>
              <div class="preview-actions">
                <button class="btn btn-outline" id="backBtn"><i class="ri-arrow-left-line"></i> 返回</button>
                <button class="btn btn-default" id="exportBtn"><i class="ri-file-excel-2-line"></i> 导出</button>
                <button class="btn btn-default" id="approveBtn">审批</button>
                <button class="btn btn-primary" id="editBtn">编辑</button>
                <button class="btn btn-primary" id="calcBtn">运费试算</button>
              </div>
            </div>
          </div>
          <div class="preview-body">
            <div id="previewTabs" class="preview-tabs"></div>
            <div id="previewContent" class="preview-content"></div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="./assets/js/sdms-sidebar.js"></script>
  <script src="./assets/js/sdms-header-tabs.js"></script>
  <script src="./assets/js/quotation-preview.js"></script>
</body>
</html>
