<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>结算单详情</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/sdms-design-tokens.css">
  <link rel="stylesheet" href="./assets/css/sdms-shell-common.css">
  <link rel="stylesheet" href="./assets/css/sdms-comp-config-list.css">
  <link rel="stylesheet" href="./assets/css/sdms-comp-fee-sheet-list.css">
  <link rel="stylesheet" href="./assets/css/settlement-detail.css">
</head>
<body>
<div class="app-shell">
<aside class="side-bar" data-sdms-sidebar data-sidebar-key="finance"></aside>
<div class="page-shell">
<div class="header-tabs" data-sdms-header-tabs data-tab-set="finance-editor" data-tab-key="settlement-list" data-include-tools="true" data-user-name="张三"></div>
<main class="content-wrap">
<section class="settlement-detail-page" id="settlementDetailPage">
  <div class="detail-top-bar">
    <div class="breadcrumb">结算管理 / <strong id="breadcrumbNo">—</strong></div>
    <div class="detail-actions">
      <button class="btn btn-primary" id="writeoffBtn" type="button">核销</button>
      <button class="btn btn-default" id="confirmBtn" type="button">确认核销</button>
      <button class="btn btn-default" id="cancelBtn" type="button">取消</button>
      <button class="btn btn-default" id="reverseBtn" type="button">冲销</button>
    </div>
  </div>
  <div class="status-banner" id="statusBanner"></div>
  <div class="info-card">
    <div class="info-card-title">基本信息</div>
    <div class="info-grid" id="settlementInfo"></div>
  </div>
  <div class="info-card" id="attachmentCard">
    <div class="info-card-title">付款凭证</div>
    <div id="attachmentContent"></div>
  </div>
  <div class="info-card">
    <div class="info-card-title">
      核销明细
      <button class="btn btn-default" id="addWriteoffBtn" type="button" style="float:right;font-size:12px;padding:4px 12px">添加核销</button>
    </div>
    <div class="detail-table-wrap">
      <table class="list-table">
        <thead>
          <tr>
            <th>账单号</th>
            <th>应收金额(CNY)</th>
            <th>已收金额(CNY)</th>
            <th>本次核销金额(CNY)</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="writeoffBody"></tbody>
      </table>
    </div>
    <div class="writeoff-summary" id="writeoffSummary"></div>
  </div>
  <div class="modal-mask" id="writeoffModal" aria-hidden="true">
    <div class="modal-dialog" style="width:min(800px,calc(100vw - 32px))">
      <div class="modal-header">
        <span class="modal-title">选择核销账单</span>
        <button type="button" class="modal-close" id="writeoffModalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-toolbar" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:12px;color:#999">勾选账单后点击一键分配，或手动填写分配金额</span>
          <button class="btn btn-default" id="autoAllocateBtn" type="button" style="font-size:12px;padding:4px 12px">一键分配</button>
        </div>
        <div id="writeoffModalBody"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" id="writeoffModalCancel">取消</button>
        <button class="btn btn-primary" id="writeoffModalSave">保存</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="cancelModal" style="display:none">
    <div class="modal-box">
      <div class="modal-title">确认取消结算单</div>
      <div class="modal-body">
        <p id="cancelInfo"></p>
        <p class="modal-warning">取消后结算单将作废，已分配的核销明细将被清除</p>
        <div class="modal-field"><label>取消原因<span class="required">*</span></label><textarea id="cancelReason" rows="3" maxlength="200" placeholder="请输入取消原因"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" id="cancelModalCancelBtn">取消</button>
        <button class="btn btn-primary" id="cancelModalConfirmBtn" style="background:var(--color-error)">确认取消</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="confirmModal" style="display:none">
    <div class="modal-box">
      <div class="modal-title">确认核销</div>
      <div class="modal-body">
        <p id="confirmInfo"></p>
        <p class="modal-warning">确认后将更新关联账单的收款状态，未分配金额将转入客户余额</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" id="confirmModalCancelBtn">取消</button>
        <button class="btn btn-primary" id="confirmModalConfirmBtn" style="background:var(--color-success)">确认核销</button>
      </div>
    </div>
  </div>
</section>
</main>
</div>
</div>
<div class="toast-stack" id="toastStack"></div>
<script src="./assets/js/sdms-header-tabs.js"></script>
<script src="./assets/js/sdms-sidebar.js"></script>
<script src="./assets/js/settlement-detail.js"></script>
</body>
</html>
