<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BI综合报表-千仓SDMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#2563eb',
            ink: '#0f172a',
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
            violet: '#4f46e5'
          },
          boxShadow: {
            soft: '0 12px 32px rgba(15, 23, 42, 0.08)',
            panel: '0 24px 60px rgba(15, 23, 42, 0.10)'
          }
        }
      }
    };
  </script>
  <style>
    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      color: #0f172a;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(79, 70, 229, 0.10), transparent 22%),
        linear-gradient(180deg, #f4f8fd 0%, #edf3fb 48%, #e8eef8 100%);
    }

    .app-layout {
      height: calc(100dvh - 4rem);
      overflow: hidden;
    }

    .report-main {
      min-width: 0;
      min-height: 0;
      height: 100%;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    @supports not (height: 100dvh) {
      .app-layout {
        height: calc(100vh - 4rem);
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, 0.36);
      border-radius: 999px;
    }

    .shell-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(219, 228, 240, 0.92);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(10px);
    }

    .topbar {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(16px);
    }

    .panel-hero {
      position: relative;
      overflow: hidden;
      color: #ffffff;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.18), transparent 30%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.96) 0%, rgba(29, 78, 216, 0.92) 46%, rgba(15, 118, 110, 0.88) 100%);
    }

    .menu-item {
      border-right: 3px solid transparent;
      transition: all 0.2s ease;
    }

    .menu-item:hover {
      background: #f8fbff;
      color: #1d4ed8;
    }

    .menu-item.active {
      background: linear-gradient(90deg, rgba(239, 246, 255, 0.96) 0%, rgba(234, 244, 255, 0.96) 100%);
      border-right-color: #2563eb;
      color: #1d4ed8;
    }

    .menu-item.active .menu-icon {
      background: rgba(37, 99, 235, 0.14);
      color: #1d4ed8;
    }

    .menu-icon {
      display: inline-flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: rgba(148, 163, 184, 0.12);
      color: #64748b;
      transition: all 0.2s ease;
    }

    .report-tab {
      border: 1px solid rgba(219, 228, 240, 0.92);
      border-radius: 999px;
      background: rgba(248, 250, 252, 0.92);
      color: #475569;
      transition: all 0.2s ease;
    }

    .report-tab.active {
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      border-color: transparent;
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
    }

    .btn-primary,
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 12px;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.92);
      color: #334155;
      border: 1px solid rgba(209, 219, 234, 0.96);
    }

    .btn-secondary:hover,
    .report-tab:hover {
      background: #f8fbff;
      color: #1d4ed8;
      border-color: rgba(37, 99, 235, 0.24);
    }

    .form-input {
      width: 100%;
      height: 40px;
      border: 1px solid rgba(203, 213, 225, 0.96);
      border-radius: 12px;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.96);
      color: #0f172a;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.6);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .quick-range {
      border-radius: 999px;
      background: rgba(241, 245, 249, 0.92);
      color: #64748b;
      transition: all 0.2s ease;
    }

    .quick-range.active {
      background: rgba(239, 246, 255, 0.96);
      color: #1d4ed8;
    }

    .stat-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 22px 20px;
      color: #ffffff;
      box-shadow: 0 20px 42px rgba(15, 23, 42, 0.12);
    }

    .stat-card::after {
      content: "";
      position: absolute;
      right: -20px;
      top: -20px;
      width: 120px;
      height: 120px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.20), transparent 70%);
    }

    .tone-blue {
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
    }

    .tone-green {
      background: linear-gradient(135deg, #059669 0%, #0f766e 100%);
    }

    .tone-orange {
      background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
    }

    .tone-violet {
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
    }

    .data-table thead th {
      background: #f8fafc;
      color: #475569;
      font-weight: 600;
      font-size: 13px;
    }

    .data-table td,
    .data-table th {
      border-bottom: 1px solid rgba(226, 232, 240, 0.90);
    }

    .data-table tbody tr:hover td {
      background: #f8fbff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
    }

    .badge-blue {
      background: rgba(37, 99, 235, 0.10);
      color: #2563eb;
    }

    .badge-green {
      background: rgba(16, 185, 129, 0.10);
      color: #059669;
    }

    .badge-orange {
      background: rgba(245, 158, 11, 0.10);
      color: #d97706;
    }

    .badge-red {
      background: rgba(239, 68, 68, 0.10);
      color: #dc2626;
    }

    .toolbar-tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: rgba(241, 245, 249, 0.92);
      padding: 6px 10px;
      font-size: 12px;
      color: #64748b;
    }

    .toast {
      position: fixed;
      top: 84px;
      right: 20px;
      z-index: 120;
      border-radius: 14px;
      padding: 12px 16px;
      color: #ffffff;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.22);
      animation: toast-in 0.28s ease;
    }

    .toast-success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    }

    .toast-warning {
      background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
    }

    .toast-error {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    }

    @keyframes toast-in {
      from {
        transform: translateY(-8px) translateX(24px);
        opacity: 0;
      }
      to {
        transform: translateY(0) translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body class="h-screen">
  <header class="topbar fixed inset-x-0 top-0 z-40 border-b border-white/60">
    <div class="flex h-16 items-center justify-between px-4 md:px-6">
      <div class="flex items-center gap-3">
        <button id="menuToggle" class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white text-slate-600 shadow-soft md:hidden">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 7h16M4 12h16M4 17h16"></path>
          </svg>
        </button>
        <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-gradient-to-br from-brand to-violet text-white shadow-soft">
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v13a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 18.5v-13Zm3 1.75a.75.75 0 0 0 0 1.5h10a.75.75 0 0 0 0-1.5H7Zm0 4a.75.75 0 0 0 0 1.5h6.5a.75.75 0 0 0 0-1.5H7Zm0 4a.75.75 0 0 0 0 1.5h10a.75.75 0 0 0 0-1.5H7Z"></path>
          </svg>
        </div>
        <div>
          <div class="text-base font-semibold text-ink">千仓SDMS</div>
          <div class="text-xs text-slate-500">BI综合报表中心</div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="hidden rounded-full border border-slate-200 bg-white px-3 py-2 text-xs text-slate-500 shadow-soft lg:flex lg:items-center lg:gap-2">
          <span class="inline-flex h-2 w-2 rounded-full bg-success"></span>
          数据同步正常
        </div>
        <div class="flex items-center gap-3 rounded-full border border-slate-200 bg-white px-2 py-1.5 shadow-soft">
          <div class="flex h-8 w-8 items-center justify-center rounded-full bg-brand text-sm font-semibold text-white">赵</div>
          <div class="pr-2">
            <div class="text-sm font-medium text-slate-700">赵敏</div>
            <div class="text-[11px] text-slate-400">BI运营</div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="app-layout flex pt-16">
    <div id="sidebarOverlay" class="fixed inset-0 z-20 hidden bg-slate-950/30 md:hidden"></div>

    <aside id="sidebar" class="shell-card fixed inset-y-16 left-0 z-30 w-72 -translate-x-full overflow-y-auto rounded-none border-l-0 border-t-0 border-b-0 transition-transform duration-300 md:static md:h-full md:shrink-0 md:translate-x-0 md:border-y-0 md:border-r">
      <div class="border-b border-slate-200/80 px-5 py-5">
        <div class="text-sm font-semibold text-slate-800">报表导航</div>
        <div class="mt-1 text-xs leading-5 text-slate-500">参考报表管理页的分组方式，统一整合出入库、库存和服务质量视图。</div>
      </div>
      <div class="px-4 py-4">
        <div class="mb-6">
          <div class="mb-2 px-3 text-[11px] font-semibold uppercase tracking-[0.22em] text-slate-400">出库报表</div>
          <nav class="space-y-1">
            <button class="menu-item flex w-full items-center gap-3 rounded-l-2xl px-3 py-2.5 text-left text-sm" data-report="shipment"><span class="menu-icon">出</span><span>备货订单出货报表</span></button>
            <button class="menu-item flex w-full items-center gap-3 rounded-l-2xl px-3 py-2.5 text-left text-sm" data-report="reassign"><span class="menu-icon">重</span><span>重派订单报表</span></button>
          </nav>
        </div>
        <div class="mb-6">
          <div class="mb-2 px-3 text-[11px] font-semibold uppercase tracking-[0.22em] text-slate-400">入库报表</div>
          <nav class="space-y-1">
            <button class="menu-item flex w-full items-center gap-3 rounded-l-2xl px-3 py-2.5 text-left text-sm" data-report="putaway"><span class="menu-icon">上</span><span>上架量报表</span></button>
            <button class="menu-item flex w-full items-center gap-3 rounded-l-2xl px-3 py-2.5 text-left text-sm" data-report="return"><span class="menu-icon">退</span><span>退件入仓报表</span></button>
          </nav>
        </div>
        <div class="mb-6">
          <div class="mb-2 px-3 text-[11px] font-semibold uppercase tracking-[0.22em] text-slate-400">库存报表</div>
          <nav class="space-y-1">
            <button class="menu-item flex w-full items-center gap-3 rounded-l-2xl px-3 py-2.5 text-left text-sm" data-report="inventory"><span class="menu-icon">库</span><span>库存报表</span></button>
          </nav>
        </div>
        <div>
          <div class="mb-2 px-3 text-[11px] font-semibold uppercase tracking-[0.22em] text-slate-400">服务质量报表</div>
          <nav class="space-y-1">
            <button class="menu-item flex w-full items-center gap-3 rounded-l-2xl px-3 py-2.5 text-left text-sm" data-report="sign-rate"><span class="menu-icon">签</span><span>客户签收率报表</span></button>
            <button class="menu-item flex w-full items-center gap-3 rounded-l-2xl px-3 py-2.5 text-left text-sm" data-report="complaint"><span class="menu-icon">诉</span><span>客诉分析报表</span></button>
            <button class="menu-item flex w-full items-center gap-3 rounded-l-2xl px-3 py-2.5 text-left text-sm" data-report="compensation"><span class="menu-icon">赔</span><span>赔付分析报表</span></button>
          </nav>
        </div>
      </div>
    </aside>

    <main class="report-main flex-1 px-4 py-5 md:px-6 md:py-6 lg:px-8">
      <section class="panel-hero shell-card mb-4 rounded-[28px] border-0 p-5 md:p-7">
        <div class="relative z-10 flex flex-col gap-6 xl:flex-row xl:items-end xl:justify-between">
          <div class="max-w-4xl">
            <div class="mb-3 flex flex-wrap items-center gap-2">
              <span class="rounded-full bg-white/16 px-3 py-1.5 text-xs text-white/90">BI综合报表中心</span>
              <span id="heroCurrentReport" class="rounded-full bg-white/16 px-3 py-1.5 text-xs text-white/90">备货订单出货报表</span>
            </div>
            <h1 class="text-2xl font-semibold tracking-wide md:text-3xl">统一查看仓配核心指标、趋势波动与风险提醒</h1>
            <p id="heroDescription" class="mt-3 max-w-3xl text-sm leading-7 text-white/80 md:text-base"></p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <button id="favoriteBtn" class="btn-secondary h-11 px-4 text-white/90" style="background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.14);">收藏视图</button>
            <button id="subscribeBtn" class="btn-secondary h-11 px-4 text-white/90" style="background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.14);">订阅日报</button>
          </div>
        </div>
        <div id="heroMeta" class="relative z-10 mt-6 grid gap-3 sm:grid-cols-2 xl:grid-cols-4"></div>
      </section>

      <section class="shell-card mb-4 rounded-[28px] p-4 md:p-5">
        <div class="mb-4 flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
          <div>
            <div class="text-xs font-semibold uppercase tracking-[0.22em] text-slate-400">快捷切换</div>
            <h2 class="text-lg font-semibold text-slate-900">综合报表主题导航</h2>
          </div>
          <div class="text-xs text-slate-500">已对齐参考页的信息节奏，适合评审演示与方案对比。</div>
        </div>
        <div id="reportTabs" class="flex flex-wrap gap-2"></div>
      </section>

      <section class="shell-card mb-4 rounded-[28px] p-4 md:p-5">
        <div class="mb-4 flex flex-col gap-2 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <div class="text-xs font-semibold uppercase tracking-[0.22em] text-slate-400">查询条件</div>
            <h2 id="reportTitle" class="text-xl font-semibold text-slate-900"></h2>
            <p id="reportSummary" class="mt-2 text-sm leading-6 text-slate-500"></p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <span id="scopeTag" class="toolbar-tag"></span>
            <span id="syncTag" class="toolbar-tag"></span>
          </div>
        </div>
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-6">
          <div class="md:col-span-2 xl:col-span-2">
            <label class="mb-1.5 block text-xs text-slate-500">时间范围<span class="text-red-500">*</span></label>
            <div class="grid grid-cols-[minmax(0,1fr)_16px_minmax(0,1fr)] items-center gap-2">
              <input id="startDate" type="date" class="form-input min-w-0" value="2026-01-01">
              <span class="text-center text-slate-400">~</span>
              <input id="endDate" type="date" class="form-input min-w-0" value="2026-03-18">
            </div>
          </div>
          <div>
            <label class="mb-1.5 block text-xs text-slate-500">仓库</label>
            <select id="warehouse" class="form-input">
              <option value="">全部仓库</option>
              <option value="深圳兴围仓">深圳兴围仓</option>
              <option value="广州白云仓">广州白云仓</option>
              <option value="香港葵涌仓">香港葵涌仓</option>
            </select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs text-slate-500">客户/货主</label>
            <select id="customer" class="form-input"></select>
          </div>
          <div>
            <label id="filterALabel" class="mb-1.5 block text-xs text-slate-500">主题维度</label>
            <select id="filterA" class="form-input"></select>
          </div>
          <div>
            <label id="filterBLabel" class="mb-1.5 block text-xs text-slate-500">状态</label>
            <select id="filterB" class="form-input"></select>
          </div>
        </div>
        <div class="mt-4 flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
          <div class="flex flex-wrap items-center gap-2">
            <span class="text-xs text-slate-500">快捷时间:</span>
            <button class="quick-range px-3 py-1.5 text-xs" data-days="7">近7天</button>
            <button class="quick-range px-3 py-1.5 text-xs" data-days="30">近30天</button>
            <button class="quick-range active px-3 py-1.5 text-xs" data-days="90">近3个月</button>
            <button class="quick-range px-3 py-1.5 text-xs" data-days="180">近半年</button>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <button id="resetBtn" class="btn-secondary h-10 px-4">重置</button>
            <button id="exportBtn" class="btn-secondary h-10 px-4">导出</button>
            <button id="queryBtn" class="btn-primary h-10 px-4">查询</button>
          </div>
        </div>
      </section>

      <section id="statCards" class="mb-4 grid gap-4 sm:grid-cols-2 xl:grid-cols-4"></section>

      <section class="mb-4 grid gap-4 xl:grid-cols-[minmax(0,1.6fr)_minmax(320px,1fr)]">
        <div class="shell-card rounded-[28px] p-5">
          <div class="mb-5 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
            <div>
              <div class="text-xs font-semibold uppercase tracking-[0.22em] text-slate-400">趋势分析</div>
              <h3 id="trendTitle" class="text-lg font-semibold text-slate-900"></h3>
            </div>
            <span class="toolbar-tag">统计维度:按日</span>
          </div>
          <div class="h-[320px]">
            <canvas id="trendChart"></canvas>
          </div>
        </div>
        <div class="space-y-4">
          <div class="shell-card rounded-[28px] p-5">
            <div class="mb-5 flex items-center justify-between gap-3">
              <div>
                <div class="text-xs font-semibold uppercase tracking-[0.22em] text-slate-400">结构分析</div>
                <h3 id="structureTitle" class="text-lg font-semibold text-slate-900"></h3>
              </div>
              <span class="toolbar-tag">按占比</span>
            </div>
            <div class="h-[240px]">
              <canvas id="structureChart"></canvas>
            </div>
          </div>
          <div class="shell-card rounded-[28px] p-5">
            <div class="mb-4 flex items-center justify-between gap-3">
              <div>
                <div class="text-xs font-semibold uppercase tracking-[0.22em] text-slate-400">运营提示</div>
                <h3 class="text-lg font-semibold text-slate-900">当前关注点</h3>
              </div>
              <span class="toolbar-tag">评审摘要</span>
            </div>
            <div id="insightList" class="space-y-3"></div>
          </div>
        </div>
      </section>

      <section class="shell-card overflow-hidden rounded-[28px]">
        <div class="border-b border-slate-200/80 p-5">
          <div class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
            <div>
              <div class="text-xs font-semibold uppercase tracking-[0.22em] text-slate-400">明细数据</div>
              <h3 id="tableTitle" class="text-lg font-semibold text-slate-900"></h3>
            </div>

      const b = bigint & 255;

    function statusClass(value) {
      if (['已签收', '已完成', '已闭环', '健康', '优秀'].includes(value)) return 'badge-green';
      if (['运输中', '处理中', '审批中'].includes(value)) return 'badge-blue';
      if (['待装车', '待上架', '待复核', '待审批', '关注'].includes(value)) return 'badge-orange';
      if (['预警', '待确认'].includes(value)) return 'badge-red';
      return 'badge-blue';
    }

    function tagClass(value) {
      const styles = ['badge-blue', 'badge-green', 'badge-orange', 'badge-red'];
      const score = Array.from(String(value)).reduce((sum, char) => sum + char.charCodeAt(0), 0);
      return styles[score % styles.length];
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 2400);
    }

    function buildTrendChart(report) {
      const type = report.trend.type;
      return {
        type,
        data: {
          labels: report.trend.labels,
          datasets: report.trend.datasets.map(dataset => ({
            label: dataset.label,
            data: dataset.data,
            borderColor: dataset.color,
            backgroundColor: type === 'line' ? hexToRgba(dataset.color, 0.12) : hexToRgba(dataset.color, 0.82),
            tension: 0.35,
            fill: type === 'line',
            borderWidth: 2,
            pointRadius: type === 'line' ? 3 : 0,
            borderRadius: type === 'bar' ? 10 : 0,
            maxBarThickness: type === 'bar' ? 24 : undefined
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
              labels: {
                usePointStyle: true,
                color: '#475569'
              }
            }
          },
          scales: {
            y: {
              beginAtZero: !report.trend.yRange,
              min: report.trend.yRange ? report.trend.yRange.min : undefined,
              max: report.trend.yRange ? report.trend.yRange.max : undefined,
              grid: { color: 'rgba(226, 232, 240, 0.70)' },
              ticks: { color: '#64748b' }
            },
            x: {
              grid: { display: false },
              ticks: { color: '#64748b' }
            }
          }
        }
      };
    }

    function buildStructureChart(report) {
      if (report.structure.type === 'bar') {
        return {
          type: 'bar',
          data: {
            labels: report.structure.labels,
            datasets: [{
              label: report.structure.title,
              data: report.structure.values,
              backgroundColor: report.structure.labels.map((_, index) => hexToRgba(['#2563eb', '#10b981', '#7c3aed'][index % 3], 0.82)),
              borderRadius: 10,
              maxBarThickness: 34
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false }
            },
            scales: {
              y: {
                min: 90,
                max: 100,
                grid: { color: 'rgba(226, 232, 240, 0.70)' },
                ticks: { color: '#64748b' }
              },
              x: {
                grid: { display: false },
                ticks: { color: '#64748b' }
              }
            }
          }
        };
      }

      return {
        type: 'doughnut',
        data: {
          labels: report.structure.labels,
          datasets: [{
            data: report.structure.values,
            backgroundColor: report.structure.labels.map((_, index) => ['#2563eb', '#10b981', '#f59e0b', '#7c3aed'][index % 4]),
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: {
              position: 'right',
              labels: {
                usePointStyle: true,
                color: '#475569',
                padding: 16
              }
            }
          }
        }
      };
    }

    function collectFilters() {
      state.filters.startDate = document.getElementById('startDate').value;
      state.filters.endDate = document.getElementById('endDate').value;
      state.filters.warehouse = document.getElementById('warehouse').value;
      state.filters.customer = document.getElementById('customer').value;
      state.filters.filterA = document.getElementById('filterA').value;
      state.filters.filterB = document.getElementById('filterB').value;
      state.filters.keyword = document.getElementById('keywordInput').value.trim();
    }

    function getFilteredRows() {
      const report = reportDefinitions[state.currentReport];
      return report.rows.filter(row => {
        const rowDate = row.time.slice(0, 10);
        const matchDate = (!state.filters.startDate || rowDate >= state.filters.startDate) && (!state.filters.endDate || rowDate <= state.filters.endDate);
        const matchWarehouse = !state.filters.warehouse || row.warehouse === state.filters.warehouse;
        const matchCustomer = !state.filters.customer || row.customer === state.filters.customer;
        const matchTag = !state.filters.filterA || row.tag === state.filters.filterA;
        const matchStatus = !state.filters.filterB || row.status === state.filters.filterB;
        const matchKeyword = !state.filters.keyword || Object.values(row).some(value => String(value).toLowerCase().includes(state.filters.keyword.toLowerCase()));
        return matchDate && matchWarehouse && matchCustomer && matchTag && matchStatus && matchKeyword;
      });
    }

    function renderPagination(total) {
      const maxPage = Math.max(1, Math.ceil(total / state.pagination.pageSize));
      if (state.pagination.currentPage > maxPage) {
        state.pagination.currentPage = maxPage;
      }

      document.getElementById('prevBtn').disabled = state.pagination.currentPage === 1;
      document.getElementById('nextBtn').disabled = state.pagination.currentPage === maxPage;

      const startPage = Math.max(1, state.pagination.currentPage - 2);
      const endPage = Math.min(maxPage, startPage + 4);
      const pageMarkup = [];

      for (let page = startPage; page <= endPage; page += 1) {
        pageMarkup.push(`
          <button class="${page === state.pagination.currentPage ? 'h-9 rounded-xl bg-brand px-3 text-sm text-white shadow-soft' : 'btn-secondary h-9 px-3 text-sm'}" data-page="${page}">
            ${page}
          </button>
        `);
      }

      document.getElementById('pageNumbers').innerHTML = pageMarkup.join('');
    }

    function renderTable() {
      const report = reportDefinitions[state.currentReport];
      const filteredRows = getFilteredRows();
      const maxPage = Math.max(1, Math.ceil(filteredRows.length / state.pagination.pageSize));
      if (state.pagination.currentPage > maxPage) {
        state.pagination.currentPage = maxPage;
      }
      const start = (state.pagination.currentPage - 1) * state.pagination.pageSize;
      const pageRows = filteredRows.slice(start, start + state.pagination.pageSize);

      document.getElementById('tagHeader').textContent = report.tagHeader;
      document.getElementById('valueHeader').textContent = report.valueHeader;
      document.getElementById('tableTitle').textContent = report.title.replace('报表', '明细');
      document.getElementById('tableToolbar').innerHTML = report.toolbar.map(text => `<span class="toolbar-tag">${text}</span>`).join('');

      document.getElementById('tableBody').innerHTML = pageRows.length ? pageRows.map(row => `
        <tr class="h-12">
          <td class="px-4 text-slate-700">${row.code}</td>
          <td class="px-4 text-slate-700">${row.customer}</td>
          <td class="px-4 text-slate-700">${row.warehouse}</td>
          <td class="px-4"><span class="badge ${tagClass(row.tag)}">${row.tag}</span></td>
          <td class="px-4 text-right text-slate-700">${row.value}</td>
          <td class="px-4 text-slate-700">${row.time}</td>
          <td class="px-4"><span class="badge ${statusClass(row.status)}">${row.status}</span></td>
        </tr>
      `).join('') : `
        <tr>
          <td colspan="7" class="px-4 py-16 text-center text-sm text-slate-400">暂无匹配数据，请调整查询条件后重试</td>
        </tr>
      `;

      document.getElementById('totalCount').textContent = filteredRows.length;
      document.getElementById('currentStart').textContent = filteredRows.length ? start + 1 : 0;
      document.getElementById('currentEnd').textContent = filteredRows.length ? Math.min(start + state.pagination.pageSize, filteredRows.length) : 0;

      renderPagination(filteredRows.length);
    }

    function renderAll() {
      renderTabs();
      renderSidebar();
      renderHero();
      renderFilters();
      renderStats();
      renderCharts();
      renderInsights();
      renderTable();
      document.querySelectorAll('.quick-range').forEach(button => {
        button.classList.toggle('active', Number(button.dataset.days) === state.filters.quickDays);
      });
    }

    function setQuickRange(days) {
      const endDate = new Date(ANCHOR_DATE);
      const startDate = new Date(ANCHOR_DATE);
      startDate.setDate(startDate.getDate() - days + 1);
      state.filters.startDate = `${startDate.getFullYear()}-${pad(startDate.getMonth() + 1)}-${pad(startDate.getDate())}`;
      state.filters.endDate = `${endDate.getFullYear()}-${pad(endDate.getMonth() + 1)}-${pad(endDate.getDate())}`;
      state.filters.quickDays = days;
      document.getElementById('startDate').value = state.filters.startDate;
      document.getElementById('endDate').value = state.filters.endDate;
      document.querySelectorAll('.quick-range').forEach(button => {
        button.classList.toggle('active', Number(button.dataset.days) === days);
      });
    }

    function resetFilters() {
      state.filters = {
        startDate: '2026-01-01',
        endDate: '2026-03-18',
        warehouse: '',
        customer: '',
        filterA: '',
        filterB: '',
        keyword: '',
        quickDays: 90
      };
      state.pagination.currentPage = 1;
      renderAll();
    }

    function switchReport(reportKey) {
      if (!reportDefinitions[reportKey]) return;
      state.currentReport = reportKey;
      state.filters.customer = '';
      state.filters.filterA = '';
      state.filters.filterB = '';
      state.filters.keyword = '';
      state.pagination.currentPage = 1;
      renderAll();
      if (window.innerWidth < 768) {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.add('hidden');
      }
      showToast(`已切换到${reportDefinitions[reportKey].title}`);
    }

    function initEvents() {
      document.addEventListener('click', event => {
        const reportTrigger = event.target.closest('[data-report]');
        if (reportTrigger) {
          switchReport(reportTrigger.dataset.report);
          return;
        }

        const pageTrigger = event.target.closest('[data-page]');
        if (pageTrigger) {
          state.pagination.currentPage = Number(pageTrigger.dataset.page);
          renderTable();
        }
      });

      document.getElementById('queryBtn').addEventListener('click', () => {
        collectFilters();
        if (state.filters.startDate && state.filters.endDate && state.filters.startDate > state.filters.endDate) {
          showToast('开始日期不能晚于结束日期', 'error');
          return;
        }
        state.pagination.currentPage = 1;
        renderTable();
        showToast('查询成功');
      });

      document.getElementById('resetBtn').addEventListener('click', () => {
        resetFilters();
        showToast('已重置查询条件');
      });

      document.getElementById('exportBtn').addEventListener('click', () => {
        const total = getFilteredRows().length;
        if (total > 100000) {
          showToast('数据量过大,请缩小查询范围', 'warning');
          return;
        }
        showToast(`正在导出，共${total}条数据`, 'warning');
      });

      document.getElementById('favoriteBtn').addEventListener('click', () => {
        showToast('已收藏当前报表视图');
      });

      document.getElementById('subscribeBtn').addEventListener('click', () => {
        showToast('已订阅当前报表日报');
      });

      document.getElementById('prevBtn').addEventListener('click', () => {
        if (state.pagination.currentPage > 1) {
          state.pagination.currentPage -= 1;
          renderTable();
        }
      });

      document.getElementById('nextBtn').addEventListener('click', () => {
        const totalPages = Math.max(1, Math.ceil(getFilteredRows().length / state.pagination.pageSize));
        if (state.pagination.currentPage < totalPages) {
          state.pagination.currentPage += 1;
          renderTable();
        }
      });

      document.getElementById('pageSize').addEventListener('change', event => {
        state.pagination.pageSize = Number(event.target.value);
        state.pagination.currentPage = 1;
        renderTable();
      });

      document.getElementById('keywordInput').addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          event.preventDefault();
          document.getElementById('queryBtn').click();
        }
      });

      document.querySelectorAll('.quick-range').forEach(button => {
        button.addEventListener('click', () => {
          setQuickRange(Number(button.dataset.days));
        });
      });

      document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.remove('hidden');
      });

      document.getElementById('sidebarOverlay').addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.add('hidden');
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth >= 768) {
          document.getElementById('sidebar').classList.remove('-translate-x-full');
          document.getElementById('sidebarOverlay').classList.add('hidden');
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderAll();
      initEvents();
    });
  </script>
</body>
</html>
